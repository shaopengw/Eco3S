# 就业市场插件元数据
name: default_job_market
version: 1.0.0
description: 默认就业市场插件
author: AgentWorld Team
enabled: true

# 插件类信息
plugin_class: DefaultJobMarketPlugin
module: job_market_plugin

# 实现的接口
interfaces:
  - IJobMarketPlugin
  - IJobMarket

# 依赖项
dependencies:
  - default_population
  - default_towns

# 初始化参数
init_params:
  enable_job_market: true

# 配置项
config:
  job_types: 10
  enable_salary_dynamics: true
