# 城镇插件元数据
name: default_towns
version: 1.0.0
description: 默认城镇系统插件
author: AgentWorld Team
enabled: true

# 插件类信息
plugin_class: DefaultTownsPlugin
module: towns_plugin

# 实现的接口
interfaces:
  - ITownsPlugin
  - ITowns

# 依赖项
dependencies: 
  - default_map

# 初始化参数
init_params:
  data_file: "config/default/towns_data.json"

# 配置项
config:
  enable_town_growth: false
  enable_migration: false
