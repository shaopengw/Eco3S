# 城镇插件元数据
name: towns
version: 1.0.0
description: 默认城镇系统插件
author: AgentWorld Team
enabled: true

# 插件类信息
plugin_class: DefaultTownsPlugin
module: towns_plugin

# 实现的接口
interfaces:
  - ITownsPlugin
  - ITowns

# 依赖项
dependencies: 
  - map

# 配置项
config:
  enable_town_growth: false
  enable_migration: false
