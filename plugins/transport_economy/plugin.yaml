# 交通经济插件元数据
name: default_transport_economy
version: 1.0.0
description: 默认交通经济系统插件
author: AgentWorld Team
enabled: true

# 插件类信息
plugin_class: DefaultTransportEconomyPlugin
module: transport_economy_plugin

# 实现的接口
interfaces:
  - ITransportEconomyPlugin
  - ITransportEconomy

# 依赖项
dependencies:
  - default_map
  - default_towns

# 初始化参数
init_params:
  enable_transport: true
  enable_economy: true

# 配置项
config:
  transport_mode: mixed
  economic_model: market_based
