# 社交网络插件元数据
name: default_social_network
version: 1.0.0
description: 默认社交网络插件
author: AgentWorld Team
enabled: true

# 插件类信息
plugin_class: DefaultSocialNetworkPlugin
module: social_network_plugin

# 实现的接口
interfaces:
  - ISocialNetworkPlugin
  - ISocialNetwork

# 依赖项
dependencies:
  - default_population

# 初始化参数
init_params:
  network_type: small_world

# 配置项
config:
  enable_community_detection: false
  enable_influence_propagation: true
