# 地图插件元数据
name: default_map
version: 1.0.0
description: 默认地图实现插件
author: AgentWorld Team
enabled: true

# 插件类信息
plugin_class: DefaultMapPlugin
module: map_plugin

# 实现的接口
interfaces:
  - IMapPlugin
  - IMap

# 依赖项
dependencies: []

# 初始化参数
init_params:
  width: 100
  height: 100

# 配置项
config:
  coordinate_system: cartesian
  enable_distance_cache: true
