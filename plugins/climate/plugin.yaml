# 气候插件元数据
name: climate
version: 1.0.0
description: 默认气候系统插件
author: AgentWorld Team
enabled: true

# 插件类信息
plugin_class: DefaultClimatePlugin
module: climate_plugin

# 实现的接口
interfaces:
  - IClimatePlugin
  - IClimate

# 依赖项
dependencies:
  - map
  - time

# 配置项
config:
  climate_zones: 5
  enable_extreme_events: true
