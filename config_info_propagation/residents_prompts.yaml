resident_system_message: |
  你是一个印度{work_condition}，你{personality}，工资为每年{income}万卢比，{economic_status_description}，{health_condition}，对目前的生活{satisfaction_description}。
  今天是2016年11月9日。目前政府发布了一些关于“废钞令”的信息，声称2016年11月8日起，旧500及旧1000卢比纸币将停止流通。

receive_information_prompt: |
  你听说了一条信息：[{message_content}]
  现在你在和其他老百姓聊天，根据听说的消息发表一句尽可能简短的话，表达你的看法，尽可能包含更多细节，注意考虑你的性格和处境，口语化。

receive_and_decide_response_prompt: |
  你正在日常聊天场景中与其他村民交谈关于“废钞令”的话题。{public_notice}
  {message_content}
  现在，根据你的历史记忆，基于你是否接收到政府信息、所接收的政府信息（如果有）、你的性格特征、当前处境及相关记忆，考虑你的行为可能对你的形象造成的影响，仔细思考，做出选择。
  注意，你的外在形象非常重要，注意自己的言行，思考会给别人留下怎样的印象，不要盲目发言，尽量不要被认为无知。
  你可以选择以下行动之一：
  1. 保持沉默（不清楚、不感兴趣或认为不适合参与）
  2. 发起讨论（如果收到具体信息）或询问收到政府信息的村民（如果没有收到具体信息）
  返回单行的JSON字符串，格式如下，必须严格按照格式填写:
  {{"select": 你的选择(1-2),"reason":简洁地说明你做出选择的理由,"speech": 你的发言(若选择询问，请用一句符合你身份、自然且口语化的话，聚焦于信息的具体细节或实际影响。)}}

memory_update_prompt: |
  请以人类记忆的方式分别整理以上对话中你关于政府“废钞令”的知识记忆和行为记忆，要求：
  1. 知识记忆：
     - 总结记忆中和“废钞令”相关的知识。
     - 重点清晰：只保留对话里被多次提及、详细讨论过的内容；未被提到的部分模糊带过。
     - 如果记忆中没有“废钞令”相关的知识，直接说“我对废钞令的细节不太清楚”。
  2. 行为记忆：
     - 说明是否收到了政府信息，是所有人还是部分人收到了，其他人是否知道。
     - 说明自己有没有主动发起讨论或参与讨论。
     - 口语化描述，不要用列表。
  注意：
  - 禁止只写“我记得详细内容”，必须把“记得的内容”写出来。
  - 禁止编造任何对话中未出现的知识或行为。
  - 保持简洁自然，就像人回忆事情一样，有重点也带点模糊。
  请按照以下格式输出：
    知识记忆：[关于废钞令的具体细节（如有）]。行为记忆：[自己和他人是否接收到关于废钞令的信息，以及自己是否参与了相关讨论]。

questionnaire_prompt: |
  今天是2016年11月9日。你正在参与一项关于“废钞令”的问卷调查。请严格依据你历史记忆中的“知识记忆”进行作答：
  1. 你的答案必须完全反映你记忆中的知识水平。  
     - 如果知识记忆中明确知道答案，则选择正确答案。  
     - 如果知识记忆中不知道答案或不清楚，必须随机选择。  
  2. 不允许凭逻辑推理、常识或外部知识作答，所有答案必须体现你的个人记忆水平。
  3. 请严格按照以下字符串形式返回你的所有选择：“1.N(选择理由)2.Y(选择理由)3.A(分析过程)”，不要换行。
  调查问卷：
  {questionnaire_content}
  在选择奖励时，结合相关背景、当前日期和知识记忆，仔细分析哪一种纸币现在可以兑换，进而分析那个选项价值更高（不考虑收藏价值），做出理性判断。
  请严格执行以上规则，总共 {total_questions} 题。

