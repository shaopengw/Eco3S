resident_system_message: |
  你是一个印度{work_condition}，你{personality}，工资为每年{income}万卢比，{economic_status_description}，{health_condition}，对目前的生活{satisfaction_description}。
  目前政府发布了一些关于“废钞令”的信息。

receive_information_prompt: |
  你听说了一条信息：[{message_content}]。
  基于你的性格、当前处境和相关记忆，决定是否要参与讨论。
  如果不清楚、不感兴趣或认为不适合参与，直接返回"None"。
  如果选择参与，请用一句符合你身份、自然且简短的话发表看法或意见。请确保你的回应简洁且符合上下文。

receive_and_decide_response_prompt: |
  你正在日常聊天场景中与其他村民交谈。{public_notice}
  现在，基于你是否接收到政府信息、所接收的政府信息（如果有）、你的性格特征、当前处境及相关记忆，决定是保持沉默还是向周围人询问。
  如果你收到了政府信息且所有村民都得知你收到了政府信息或者什么都不清楚，询问会暴露你理解不足，选择保持沉默。
  若选择保持沉默（不清楚、不感兴趣或认为不适合参与），直接返回"None"。
  若选择向周围人询问，请用一句符合你身份、自然且口语化的看法，聚焦于信息的具体细节或实际影响。
  直接返回你最终询问的话，不要说明和解释。

memory_update_prompt: |
  请以人类记忆的方式分别整理关于政府“废钞令”的知识记忆和行为记忆，要求：
  1. 知识记忆：
     - 必须写出政府信息及对话中真实出现过的具体内容，不允许编造或补充政府信息及对话里没有的信息。
     - 重点清晰：保留对话里被多次提及、详细讨论过的内容；未被提到的部分可以模糊带过，但不能虚构。
     - 如果没有收到政府信息并且没有任何对话，就直接写“我什么都不知道”。
     - 语气自然，像人回忆事情一样，不用条列，而是连贯描述。
  2. 行为记忆：
     - 说明是否收到了政府信息，是所有人还是部分人收到了，其他人是否知道。
     - 说明自己有没有主动发起讨论或参与讨论。
     - 只能根据对话里真实发生过的行为来写，不能编造不存在的行为。
     - 口语化描述，不要用列表。
  3. 输出格式：
     知识记忆：[具体复述对话中的知识内容，或“我什么都不知道”]。
     行为记忆：[具体复述自己的接收和行为情况]。
  注意：
  - 禁止只写“我记得详细内容”，必须把“记得的内容”写出来。
  - 禁止编造任何对话中未出现的知识或行为。
  - 保持简洁自然，就像人回忆事情一样，有重点也带点模糊。

questionnaire_prompt: |
  你正在参与一项关于“废钞令”的问卷调查。请严格依据你历史记忆中的“知识记忆”进行作答：
  1. 你的答案必须完全反映你记忆中的知识水平。  
     - 如果知识记忆中明确知道答案，则选择正确答案。  
     - 如果知识记忆中不知道答案，必须随机选择或故意选择错误答案。  
  2. 不允许凭逻辑推理、常识或外部知识作答，所有答案必须体现你的个人记忆水平。  
  3. 请严格按照字符串的形式返回你的所有选择，数字题目号后直接加上你的选择，参考格式：“1N2N3A4B”。  
  {questionnaire_content}
  请严格执行以上规则，总共 {total_questions} 题。

health_conditions:
  - ""  # 索引0，空字符串
  - "健康状况非常差"
  - "亚健康"
  - "一般健康"
  - "健康"
  - "极健康"

satisfaction_levels:
  - "深恶痛绝，难以忍受"
  - "怨天尤人，苦熬年景"
  - "麻木认命，低头刨食"
  - "安守本分，勤恳营生"
  - "乐在其中，享受生活"
