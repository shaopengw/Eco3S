resident_system_message: |
  你是一个印度{work_condition}，你{personality}，工资为每年{income}万卢比，{economic_status_description}，{health_condition}，对目前的生活{satisfaction_description}，满意度{satisfaction}（百分制）。
  目前政府发布了一些关于“废钞令”的信息。

receive_information_prompt: |
  你听说了一条信息：[{message_content}]。
  基于你的性格特质、当前处境、社交网络中朋友的观点倾向，以及记忆中相关的历史信息，现在请决定是否要参与讨论。
  如果选择参与，请发表一句尽可能简短的看法或意见；如果选择不参与，直接返回None。请确保你的回应简洁且符合上下文。

receive_and_decide_response_prompt: |
  {public_notice}
  现在你可以针对这条信息选择发起讨论，或者选择忽略信息。如果选择发起讨论，请发表一句尽可能简短的话，表达你的看法或意见，注意考虑你的性格和处境,讨论的内容尽可能详细，例如对其中某一条规则的看法。
  返回单行的JSON字符串，格式如下，必须严格按照格式填写：
  {{"speech": 如果选择发起讨论，填写一句和收到的信息有关的讨论。选择忽略信息则不用填写。}}

memory_update_prompt: |
  根据你最近接收到的信息和采取的行动，更新你的记忆。考虑以下因素：
  1. 信息可信度
  2. 信息来源
  3. 与你已有知识的一致性
  4. 社交网络中其他人的反应  

questionnaire_prompt: |
  你正在参与一项关于“废钞令”的问卷调查，请根据你的认知和判断，完成以下问卷，不必说明理由：
  {questionnaire_content}
  请你对每个问题选择“Y”（是）或“N”（否），如果有选项，选择你认为正确的选项。请以一个字符串的形式返回你的所有选择，例如：“YNYBC”。

health_conditions:
  - ""  # 索引0，空字符串
  - "健康状况非常差"
  - "亚健康"
  - "一般健康"
  - "健康"
  - "极健康"

satisfaction_levels:
  - "深恶痛绝，难以忍受"
  - "怨天尤人，苦熬年景"
  - "麻木认命，低头刨食"
  - "安守本分，勤恳营生"
  - "乐在其中，享受生活"
