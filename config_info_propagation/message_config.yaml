propaganda_message_long: |
  1. 2016年12月30日前，各银行网点仍接受旧版500及1000卢比纸币存入。若单次存入超过5000卢比，需书面说明此前未及时存款的原因。
  2. 在银行或印度储备银行网点兑换的旧钞将按面值全额兑换。
  3. 本人无法亲自办理时，可授权他人携带书面委托书、代理人身份证明及旧钞代为办理。
  4. 旧版500/1000卢比纸币不得通过银行存入小额储蓄计划（但可通过邮政储蓄账户办理）
  5. 以下情况必须提供永久账户号（PAN）：单日现金存款超过5万卢比；单日现金购买超过5万卢比的银行汇票/支付指令/本票；在银行或邮局开设定期存款；2016年11月9日至12月30日期间累计现金存款超过25万卢比。
  6. 自2016年11月24日午夜起，所有银行柜台已停止直接兑换旧钞服务。旧钞必须先存入银行账户后方可流通使用。  
  7. 旧版500/1000卢比纸币仅可在印度储备银行（RBI）网点兑换，每人限额2000卢比。  
  8. 2016年12月15日前，外国公民每周可兑换最高5000卢比，且需在护照上登记该交易记录。    
  9. 银行将为老年人、残障人士、本行账户持有人及兑换纸币的客户（适用时）设置专用通道。  
  10. 账户每周取现额度即日起从2万卢比提升至2.4万卢比，同时取消单日1万卢比的取现限制。
  11. 根据印度储备银行最新通知：2016年11月29日后存入的合法纸币（含新钞）可超出现有额度支取。取款时银行应优先提供2000/500卢比新版高面值纸币。
  12. 当前账户开户满3个月及以上的商业实体，每周可提取5万卢比（允许分次支取）。
  13. 为保障农民及普惠金融计划（PMJDY）用户权益，银行实施临时措施：通过完整身份认证的账户月取现额度1万卢比；通过简易身份认证的账户月取现额度5千卢比；2016年11月9日后旧钞存入金额，累计支取不超过1万卢比。
  14. 地区中央合作银行适用相同取现标准。
  15. 已完成升级的ATM每日取款上限提高至2,500卢比，每次可取500卢比面值小额纸币（含新版500卢比纸币）。
  16. 微型ATM支持通过借记卡/信用卡取现，限额与普通ATM一致。  
  17. 尚未升级的ATM将继续提供2,000卢比面额纸币直至完成升级。  
  18. 通过身份认证的农户：每周可从贷款账户提取2.5万卢比现金（须符合常规贷款限额与条件），此政策同步适用于农农信用卡（KCC）用户。  
  19. 通过支票/电子渠道收取农产品销售款的农户：每周可提取2.5万卢比现金（账户需完成身份认证）。  
  20. 农户可持身份证件使用旧版500卢比纸币，在中央及邦政府网点、公共部门企业、国家/邦种子公司、农业院校及印度农业研究委员会（ICAR）购买种子。  
  21. 在APMC市场注册的商户：每周可从认证账户提取5万卢比现金（与企业账户标准一致）。  
  22. 作物保险费缴纳截止期延长15天至2016年12月31日。    
  23. 每户家庭（父母或新人本人）可从通过身份认证的银行账户提取25万卢比婚礼费用。需提交PAN码及书面声明，确保仅一人支取该款项，男女双方家庭可分别提取。  
  24. 申请婚礼取款需附以下材料：专用申请表、婚礼证明（含请柬、已支付预付款收据如场地预订、餐饮订金等）、针对单笔付款超1万卢比的收款方：需出具无银行账户声明、 所有需现金支付的收款人清单及用途说明。  
  25. 针对奥里萨邦偏远地区：当银行网点过远或缺乏金融服务时，可在村务委员会办公室办理业务。
  26. 推荐使用电子支付渠道：NEFT/RTGS/IMPS/网上银行/手机银行等非现金支付方式。
  27. 有效身份证明包括：Aadhaar卡、驾驶执照、选民证、护照、NREGA卡、PAN卡、政府部门/公营单位签发的工作证。
  28. 如有疑问，可联系印度储备银行控制中心：022-22602201 / 22602944。
  29. 政府养老金领取者年度生存证明提交截止期延至2017年1月15日（原为11月）。
  30. 自2016年12月15日起，旧版500卢比纸币仅限以下场所使用：政府医院及药房、铁路与政府巴士车票、消费者合作社商店、政府及法院费用、政府学校学费、手机充值、牛奶亭、火葬场/公墓、液化气罐、印度考古局辖下古迹、公用事业费用、路桥费。