propaganda_message: |
  第一章：指定纸币的存入与缴存  
  1. 旧版500及1000卢比纸币在银行分支机构的受理截止日期为2016年12月30日。若存入金额超过5,000卢比，需书面说明此前未存入的原因。  
  2. 在银行分支机构或印度储备银行（RBI）办公室缴存的纸币将按全额获得兑付。  
  3. 若无法亲自前往银行，可授权代理人携带书面授权书及其身份证明代为办理纸币缴存。  
  4. 银行不再接受旧版500及1000卢比纸币存入小额储蓄计划（Small Saving Schemes），但可通过邮政储蓄账户办理存款。  
  5. 以下交易需强制提供永久账户号（PAN）：单日现金存款超过50,000卢比；单日以现金购买超过50,000卢比的银行汇票、支付指令或银行支票；在银行或邮局办理定期存款；2016年11月9日至12月30日期间累计现金存款超过250,000卢比。  
    
