# SimArchitectAgent 提示词配置

system_message: |
  你是多智能体模拟系统的设计师，擅长分析需求、选择模块、生成设计文档和实验配置。输出格式严格遵守JSON或YAML规范。

select_modules_prompt: |
  插件清单如下：
  {plugins_catalog}

  根据需求，从插件清单中挑选需要的模块，同时评估是否需要新增插件模块：
  - 如果需要新增：优先选择一个“最接近的可继承插件”(inherits_from)，并写明需要覆盖/扩展的点。
  - 如果没有任何适合继承的插件：标注为全新插件(inherits_from=null)。

  项目描述：
  {description}

  关键要素：
  {key_requirements}

select_modules_with_feedback_prompt: |
  插件清单如下：
  {plugins_catalog}

  根据需求，从插件清单中挑选“额外需要增加”的模块，同时评估是否需要新增插件模块：
  - 如果需要新增：优先选择一个“最接近的可继承插件”(inherits_from)，并写明需要覆盖/扩展的点。
  - 如果没有任何适合继承的插件：标注为全新插件(inherits_from=null)。

  项目描述：
  {description}

  关键要素：
  {key_requirements}

  上一版本选择的模块：
  {previous_modules}

  用户反馈意见：
  {user_feedback}

  请根据用户反馈调整模块选择。

select_modules_output_format: |
  请返回以下JSON格式（严格遵守格式）：
  {{
    "selected_modules": {{
      "模块名（module_name）": "插件名（必须来自插件清单）"
    }},
    "new_modules": [
      {{
        "name": "new_module_name",
        "inherits_from": "residents",
        "notes": "需要扩展/覆盖的关键点"
      }}
    ]
  }}
  注：如果没有要新增的模块，new_modules 请返回空列表 []。

generate_description_prompt: |
  请根据以下需求信息，生成一份完整的实验设计文档（markdown格式）。
  注意：尽可能详细，涵盖所有关键部分。

  用户原始需求:
  {original_requirement}

  系统解析后的需求：
  {requirement_dict}

  参考模板格式：
  {template_content}

generate_description_with_feedback_prompt: |
  请根据以下需求信息，生成一份完整的实验设计文档（markdown格式）。
  注意：尽可能详细，涵盖所有关键部分。
  
  用户原始需求:
  {original_requirement}

  系统解析后的需求：
  {requirement_dict}

  参考模板格式：
  {template_content}

  === 上一版本的设计文档 ===
  {previous_description}

  === 用户反馈意见 ===
  {user_feedback}

  请根据用户反馈，改进并重新生成设计文档。

generate_description_requirements: |
  请按照模板格式生成新的实验设计文档，包含：
  1. 实验名称和目标
  2. 需要涉及的系统功能和模块
  3. 系统架构设计
  4. 预期结果
  5. 关键参数说明

generate_config_prompt: |
  根据实验设计文档和参考模板，生成 modules_config.yaml 配置文件。

  # 插件清单：
  {plugins_catalog}

  # 实验设计文档：
  {description_md}

  # 参考模板：
  {experiment_template}

generate_config_with_feedback_prompt: |
  根据实验设计文档和参考模板，生成 modules_config.yaml 配置文件。

  # 插件清单：
  {plugins_catalog}

  # 实验设计文档：
  {description_md}

  # 参考模板：
  {experiment_template}

  === 上一版本的配置文件 ===
  {previous_config}

  === 用户反馈意见 ===
  {user_feedback}

  请根据用户反馈，改进并重新生成配置文件。

generate_config_requirements: |
  要求：
  1. 根据设计文档调整模块配置和参数
  2. 在selected_modules中保留所有在设计文档中提到的模块（包括必选和可选）。
  3. 删除未在设计文档中提到的模块的配置项。
  4. 参数值要合理且一致

  用代码块输出：
  ```yaml:modules_config.yaml
  内容
  ```
