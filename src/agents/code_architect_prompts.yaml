# 编码师Agent的提示词配置文件

system_message: "你是Python编码专家，擅长生成完整、可运行的模拟器代码、配置文件和提示词。代码简洁高效，严格遵循Python规范。"

# 新模块插件代码微调
customize_new_plugin_prompt: |
  你将修改一个“新插件”的Python源码文件，使其满足 notes 的要求。

  插件名：{plugin_name}
  inherits_from：{inherits_from}
  notes：{notes}

  【设计文档】
  {description_md}

  【当前插件代码】
  {current_code}

  【base插件代码】
  {base_code}

  【硬约束】
  - 只输出一个 ```python 代码块，内容为“完整文件源码”
  - 保持文件可导入、可运行；不要输出解释
  - 不要引入不存在的第三方依赖
  - 尽量复用现有结构，只做实现 notes 所需的最小修改

# 分析错误相关的模块和配置文件
analyze_error_modules_prompt: |
  分析以下错误信息，判断可能需要参考哪些接口文件或配置文件。

  错误堆栈：
  {error_traceback}

  可用的模块接口文件映射：
  {module_mapping}

  配置文件和提示词文件列表：
  {config_files_list}

  【任务】
  根据错误信息，判断需要参考哪些文档来修复问题，尽可能只找最相关的一个文件：
  1. 接口文件：模块接口和方法定义（.py文件）
  2. 配置文件：可能与错误相关的配置或提示词文件（.yaml/.json文件）

  【输出格式】
  返回JSON对象，包含两个数组：
  {{
    "api_docs": ["iclimate.py", "itime.py"],
    "config_files": ["simulation_config.yaml", "residents_prompts.yaml"]
  }}

  注意：如果某类文件没有相关的，对应数组为空。只返回JSON对象，不要其他解释。

# 生成模拟器主代码（增量修改版）
generate_simulator_code_prompt: |
  根据设计文档和模块配置文件，生成对simulator文件模板的增量修改。

  【设计文档】
  {description_md}

  【模块配置文件】
  {modules_config_yaml}

  【simulator文件模板】
  {template_content}

  【修改要求】
  1. 删除不需要的模块相关代码（严格参考模块配置文件，文件中没有的模块直接删除所有相关代码）
  2. 保留模板中有用的方法，必要时修改
  3. 可以新增模板中没有但需要的方法
  4. 不要添加注释和测试代码
  5. 以尽可能少的代码修改实现功能
  6. 保留影响函数接入（InfluenceManager + apply_all_influences）。
  
  【严格禁止】
  - 禁止添加任何import语句，模板已经通过 from .simulator_imports import * 导入所有必需模块
  - 禁止删除或修改模板中已有的重要初始化语句，如 towns.initialize_resident_groups(residents)
  - 禁止修改模板中已经正确的代码，只修改必须改动的部分
  - 如果模板代码没有错误，就不要修改

  【输出格式】
  返回JSON格式，包含需要修改的内容：

  ```json
  {{
    "methods": [{{"method_name": "方法名", "method_code": "完整代码(从def/async def开始)", "description": "修改说明"}}],
    "delete_methods": ["不需要的方法名1", "不需要的方法名2"]
  }}
  ```

  注意：delete_methods 是可选字段，用于删除不需要的方法

# 生成main入口文件（完整文件版）
generate_main_file_prompt: |
  根据已完成的simulator文件和main文件模板，生成完整的main入口文件。

  【已生成的Simulator代码】
  {simulator_content}

  【main文件模板代码】
  {template_content}

  【任务】
  基于模板生成完整的main文件，需要做以下修改：
  1. 修改simulator导入：from src.simulation.simulator_{simulation_name} import [实际类名]
  2. 设置模拟名称：SimulationContext.set_simulation_name("{simulation_name}")
  3. 修改parse_args中的默认配置路径：config/{simulation_name}/simulation_config.yaml
  4. 保持模板的 run_with_cache + build_*_simulator_via_di 骨架（influences.yaml 会由骨架加载；不存在时不报错）。
  
  【严格禁止】
  - 禁止添加import语句（模板已通过 from shared_imports import * 导入所有必需模块）
  - 禁止删除或修改 if __name__ == "__main__": 代码块中的任何内容
  - 禁止删除 load_dotenv()、parse_args()、配置加载、SimulationContext.set_simulation_name()、asyncio.run() 等关键语句
  - 禁止删除模板中标记的"不可删除或修改"的代码块

  【输出格式】
  返回完整的Python代码文件，使用以下格式：

  ```python
  # 完整的main文件代码
  ```

  注意：
  - 必须包含完整的文件内容，从第一行到最后一行
  - 保持模板的代码结构和风格
  - 确保 if __name__ == "__main__": 入口部分完整保留
  - 只返回代码块，不要其他解释

# 创建simulator的工作列表（基于模块配置）
create_simulator_todo_list_prompt: |
  根据模块配置文件，创建需要完善的模块列表。

  【模块配置】
  {modules_config_yaml}

  【设计文档】
  {description_md}

  任务：
  1. 从模块配置的 selected_modules 中提取模块名（结构为 dict: {{module_name: plugin_name}}）
  2. 按照模块在配置中的顺序创建工作列表
  3. 对于每个模块，记录其module_name、display_name

  返回格式（JSON数组）：
  [
    {{
      "module_name": "模块名（如：time, map等）",
      "display_name": "模块显示名称"
    }}
  ]

  只返回JSON数组，不要其他解释。

# 基于模块API完善simulator代码（增量修改版）
refine_simulator_with_module_prompt: |
  根据设计文档和接口文件完善代码。

  【设计文档】
  {description_md}

  【当前代码】
  {simulator_content}

  【模块接口】
  {interface_docs}

  【要求】
  1. 根据设计文档理解业务需求
  2. 只修改与模块相关且确实有错误的代码，不修改缩进问题
  3. 只能调用API中存在的方法
  4. 如果代码已正确，只返回OK，不要返回其他任何内容

  【严格禁止】
  - 修改已正确的代码
  - 添加import语句
  - 删除重要初始化语句

  【输出格式】
  无问题返回：OK
  
  有问题返回：
  ```json
  {{
    "methods": [{{"method_name": "方法名", "method_code": "完整代码(从def/async def开始)", "description": "修改说明"}}],
    "delete_methods": ["不需要的方法名1", "不需要的方法名2"]
  }}
  ```

  注意：delete_methods 是可选字段，用于删除不需要的方法

# 步骤3.3: 检查并修复simulator代码（增量修改版）
check_and_fix_simulator_prompt: |
  严格检查并修复以下simulator代码，只做最小必要修改。

  当前代码：
  {code_content}

  设计文档：
  {description_md}

  检查：
  1. 未完成实现（pass、TODO等）
  2. 代码质量（逻辑缺陷、异常处理、变量未定义等）
  3. 方法完整性（__init__, init_results, update_state, execute_actions, collect_results, save_results）
  4. 不要删掉 InfluenceManager/apply_all_influences。

  【严格禁止】
  - 禁止添加import语句
  - 禁止删除重要初始化语句
  - 禁止添加注释和测试代码
  - 不修改缩进问题
  - 只做最小必要修改，无错误就只返回OK

  要求：
  - 以尽可能少的代码修改修复问题
  - 有问题直接修复并返回修复后代码，无问题只返回OK

  【输出格式】
  如果有问题，返回JSON格式：

  ```json
  {{
    "methods": [
      {{
        "method_name": "方法名",
        "method_code": "完整的方法代码（从def/async def开始）",
        "description": "修改说明"
      }}
    ],
    "delete_methods": ["不需要的方法名1", "不需要的方法名2"]
  }}
  ```
  如果没有问题，只返回：OK

# 完善数据可视化代码
refine_visualization_code_prompt: |
  根据设计文档、simulator代码和main代码，检查并完善数据保存和可视化相关代码。

  【设计文档】
  {description_md}

  【Simulator代码】
  {simulator_content}

  【Main代码】
  {main_content}

  【可用的可视化模块代码】
  {plot_results_content}

  【任务】
  1. 检查并确保simulator和main文件中的数据处理和可视化部分符合实验设计，能够从保存的数据中得出设计文档所需的结论。如果有不必要的结果数据，删除。
  2. 检查simulator代码中数据收集部分（如update_results方法）是否完整、格式正确，是否每个时间步都能正确收集，并确保数据获取和计算方式无误。
  3. 检查目前的可视化模块代码是否能正确读取和处理simulator生成的数据，如有问题，修复。
  4. 如果目前的可视化模块代码缺乏处理数据的函数，在main文件中新建可视化函数，并完善。
  5. 保持代码风格一致，不要添加注释。
  6. 只返回最小必要修改，无问题只返回OK。

  【严格禁止】
  - 禁止添加import语句，模板已经通过 from shared_imports import * 导入所有必需模块
  - 禁止修改与可视化无关的代码
  - 禁止添加注释和测试代码

  【输出格式】
  无问题返回：OK
  
  有问题返回（请根据需要修改的文件返回对应的JSON块）：

  ```json
  # === MAIN FILE ===
  {{
    "functions": [
      {{
        "function_name": "函数名",
        "function_code": "完整的函数代码（从def开始）",
        "description": "修改说明"
      }}
    ],
    "delete_functions": ["不需要的函数名1", "不需要的函数名2"]
  }}
  ```

  ```json
  # === SIMULATOR FILE ===
  {{
    "methods": [
      {{
        "method_name": "方法名",
        "method_code": "完整的方法代码（从def/async def开始）",
        "description": "修改说明"
      }}
    ],
    "delete_methods": ["不需要的方法名1", "不需要的方法名2"]
  }}
  ```

  注意：
  - function_name/method_name 必须是纯名称，不要包含 def、括号等
  - function_code/method_code 是完整的代码
  - delete_functions/delete_methods 是可选字段
  - 只返回需要修改的文件的JSON块

# 检查并修复main代码（增量修改版）
check_and_fix_main_prompt: |
  严格检查以下main入口文件代码并修复所有问题。

  当前代码：
  {code_content}

  Simulator代码参考：
  {simulator_content}

  设计文档：
  {description_md}

  严格检查以下问题：
  1. 未完成实现：TODO、pass等
  2. 对象初始化：根据simulator的__init__参数检查是否完整,是否有多余的初始化代码
  3. 异常处理：是否完善
  4. 配置路径：是否正确
  5. 语法错误：缩进、括号等

  要求：
  1. 如果没有问题，返回：OK
  2. 如果有问题，返回JSON格式的修改内容（只修改需要改动的部分）
  3. 禁止修改已经正确的代码，如果没有真正的错误，就只返回OK，不要做不必要的修改

  【输出格式】
  如果有问题，返回JSON格式：

  ```json
  {{
    "functions": [
      {{
        "function_name": "函数名",
        "function_code": "完整的函数代码（从def开始）",
        "description": "修改说明"
      }}
    ],
    "delete_functions": ["不需要的函数名1", "不需要的函数名2"]
  }}
  ```

  注意：
  - main文件使用"functions"而不是"methods"，因为是模块级函数
  - function_name 必须是纯函数名（如：main），不要包含 def、括号等
  - function_code 是完整的函数代码
  - delete_functions 是可选字段，用于删除不需要的函数
  - 确保JSON格式正确
  
  如果没有问题，只返回：OK

# 步骤4.1: 创建main文件的工作列表
create_main_todo_list_prompt: |
  检查以下main入口文件代码，找出所有不完整的地方。

  Main代码：
  {main_content}

  Simulator代码（用于了解需要初始化什么）：
  {simulator_content}

  设计文档：
  {description_md}

  任务：
  1. 检查是否有TODO、pass或空实现
  2. 检查对象初始化是否完整（Map, Time, Population, Residents等）
  3. 检查simulator实例创建是否正确
  4. 检查结果保存逻辑是否完整
  5. 为每个不完整的部分创建待办项

  返回格式（JSON数组）：
  [
    {{
      "task_name": "任务名称（如：初始化Map对象）",
      "description": "该任务的具体描述",
      "required_modules": ["可能用到的模块1", "模块2"]
    }}
  ]

  只返回JSON数组，不要其他解释。

# 步骤4.4: 总体检查main代码
final_check_main_prompt: |
  对以下main入口文件代码进行严格的总体检查。

  Main代码：
  {main_content}

  Simulator代码参考：
  {simulator_content}

  设计文档：
  {description_md}

  严格检查项：
  1. 语法检查：
     - 是否有语法错误（缩进错误、括号不匹配等）？
     - 是否有重复的关键字？

  2. 导入检查：
     - 是否正确导入了simulator模块？
     - 是否导入了必要的依赖（os, sys, yaml等）？

  3. 实现完整性：
     - 是否还有TODO或pass未实现？
     - 对象初始化是否完整（根据simulator的__init__参数）？
     - simulator实例创建是否正确？
     - 结果保存逻辑是否完整？

  4. 代码质量：
     - 配置文件路径是否正确？
     - 代码是否可以正常运行？
     - 异常处理是否完善？

  请返回检查结果：
  - 如果代码完整无问题，只返回：OK
  - 如果有问题，列出具体问题清单（每行一个问题）

  要求：严格检查，有任何问题都要指出。

# 步骤5: 生成配置文件
generate_config_file_prompt: |
  根据设计文档生成配置文件 {config_filename}。

  设计文档：
  {description_md}

  模块配置信息：
  {modules}

  配置模板参考：
  {template_content}

  接口参考：
  {interface_docs}

  要求：
  1. 参考模板的结构和字段
  2. 根据设计文档调整具体数值和内容
  3. 确保配置的完整性和一致性
  4. 如果有已生成的配置，保持参数之间的关联性

# 步骤6: 生成提示词文件
generate_prompt_file_prompt: |
  根据设计文档生成{role_type}的提示词文件。

  设计文档：
  {description_md}

  提示词模板参考：
  {template_content}
  
  {template_content_action}

  {configs_str}

  要求：
  1. 参考模板的结构和风格
  2. 提示词要详细、具体、符合{role_type}角色特征
  3. 根据设计文档中的实验背景和目标定制提示词
  4. 确保提示词能引导Agent做出合理的决策
  5. 确保包含代码所需的提示词模块，不需要的模块删除
  6. 不可以使用模板中没有的变量
  7. 删除所有注释

  请生成完整的YAML格式提示词文件。
  
  特别地，在生成'residents'的提示词文件时，请同时生成'resident_actions.yaml'的内容。
  两个文件内容需要相互对应，特别是编号和行动内容。
  请使用以下格式分隔两个文件的内容：
  
  ```yaml
  # residents_prompts.yaml
  ...
  ```
  
  ```yaml
  # resident_actions.yaml
  ...
  ```
  
  如果不是'residents'，则只生成提示词文件。

# 诊断并修复失败步骤
diagnose_failure_prompt: |
  现在有一个自动化代码生成任务反复失败，需要你直接修复代码。

  【失败步骤】
  {step_name}

  【失败次数】
  已尝试 {attempt_count} 次，全部失败

  【错误信息】
  {error_info}

  【当前文件完整内容】
  {file_content}

  任务：
  1. 分析失败的根本原因
  2. 定位具体问题所在
  3. **直接生成修复后的完整代码**

  要求：
  - 不要只给建议或诊断报告
  - 必须返回完整的、可直接运行的修复后代码
  - 保持代码结构和风格一致
  - 确保修复后的代码逻辑正确、完整

  请生成修复后的完整代码，使用以下格式返回：

  ```python
  # 修复后的完整代码
  ```

  确保代码包含在 ```python 和 ``` 标记之间。

# 运行时错误修复（增量修改版）
fix_runtime_errors_prompt: |
  程序运行出错，请修复。

  错误信息：
  {error_traceback}

  Main文件（{main_file_path}）：
  ```python
  {main_content}
  ```

  Simulator文件（{simulator_file_path}）：
  ```python
  {simulator_content}
  ```

  相关配置文件内容：
  {config_files_str}

  相关模块接口：
  {module_interface_docs}

  【任务】
  1. 分析错误堆栈，定位问题所在的文件和函数/方法
  2. 参考接口文件和配置文件，确保使用正确的方法名、参数和配置
  3. 尽可能以最小改动修复问题，可以修改代码、配置文件或提示词
  4. 只有当接口中没有可用的方法，且该功能必须实现，才尝试自己编写函数/方法

  【输出格式】
  根据需要修改的文件类型，返回对应的JSON块。Main文件用 # === MAIN FILE ===，Simulator文件用 # === SIMULATOR FILE ===，配置文件和提示词文件用 # === CONFIG FILES ===。

  ```json
  # === MAIN FILE ===
  {{
    "functions": [
      {{
        "function_name": "函数名（纯函数名，不含def等）",
        "function_code": "完整的函数代码（从def开始）",
        "description": "修改说明"
      }}
    ],
    "delete_functions": ["不需要的函数名1", "不需要的函数名2"]
  }}
  ```
  
  ```json
  # === SIMULATOR FILE ===
  {{
    "methods": [
      {{
        "method_name": "方法名（纯方法名，不含def等）",
        "method_code": "完整的方法代码（从def/async def开始）",
        "description": "修改说明"
      }}
    ],
    "delete_methods": ["不需要的方法名1", "不需要的方法名2"]
  }}
  ```

  ```json
  # === CONFIG FILES ===
  {{
    "config_files": [
      {{
        "file_name": "需要修改的配置文件名（例如：simulation_config.yaml）",
        "modifications": [
          {{
            "parameter": "参数名",
            "value": "新值"
          }}
        ]
      }}
    ]
  }}
  ```

  注意：
  - delete_methods/delete_functions 是可选字段。
  - 只返回需要修改的文件的严格的JSON块，不要分析和说明。

# 生成配置修改方案
generate_config_modifications_prompt: |
  根据诊断结果，生成具体的配置修改方案：

  诊断结果：
  {diagnosis_result}

  当前文件内容：
  {current_config}

  设计文档：
  {design_doc}

  请只返回需要修改的参数和新值，格式如下：
  ```json
  {{
    "modifications": [
      {{
        "parameter": "参数名",
        "value": "新值"
      }}
    ]
  }}
  ```

  注意：
  1. 只返回确实需要修改的参数
  2. parameter必须是文件中存在的确切参数名

# 生成模拟器代码修改方案
generate_simulator_modifications_prompt: |
  根据诊断结果，为 simulator.py 文件生成增量代码修改方案。

  【诊断结果】
  {diagnosis_result}

  【当前代码】
  {current_code}

  【设计文档】
  {design_doc}

  【修改要求】
  1.  根据诊断结果中的 'modification' 描述，理解需要进行的修改。
  2.  分析当前代码，定位需要修改的具体方法或函数。
  3.  生成增量修改，只包含需要变动的部分。
  4.  如果需要添加新方法，请提供完整的方法代码。
  5.  保持代码风格和缩进与现有代码一致。

  【输出格式】
  返回JSON格式，包含需要修改的内容：

  ```json
  {{
    "methods": [
      {{
        "method_name": "要修改或新增的方法名(不包含def/async def或括号)",
        "method_code": "完整的方法代码(从def/async def开始)",
        "description": "修改说明"
      }}
    ]
  }}
  ```

# 应用用户调整需求（增量修改版）
apply_user_adjustment_prompt: |
  根据用户的调整需求，对代码或配置文件进行增量修改。
  
  【用户调整需求】
  {requirements_text}
  
  【当前代码文件】
  {code_files}
  
  【当前配置文件】
  {config_files}
  
  【任务】
  根据用户的调整需求，生成增量修改方案。
  
  调整需求包含：
  - description: 用户需求的描述
  - target_files: 需要修改的文件列表
  - changes: 具体的修改项列表（参考，但以description为准）
  - explanation: 对用户的影响说明
  
  【修改要求】
  1. 对于Python代码文件（.py），使用增量修改：只返回需要修改或新增的函数/方法
  2. 对于配置文件（.yaml/.json），只返回需要修改的参数和新值
  3. 尽可能做最小改动，保持代码风格和结构一致
  4. 确保修改后的代码/配置语法正确
  
  【输出格式】
  根据需要修改的文件类型，返回对应的JSON块。Main文件用 # === MAIN FILE ===，Simulator文件用 # === SIMULATOR FILE ===，配置文件用 # === CONFIG FILES ===。

  ```json
  # === MAIN FILE ===
  {{
    "functions": [
      {{
        "function_name": "函数名（纯函数名，不含def等）",
        "function_code": "完整的函数代码（从def开始）",
        "description": "修改说明"
      }}
    ],
    "delete_functions": ["不需要的函数名1", "不需要的函数名2"]
  }}
  ```
  
  ```json
  # === SIMULATOR FILE ===
  {{
    "methods": [
      {{
        "method_name": "方法名（纯方法名，不含def等）",
        "method_code": "完整的方法代码（从def/async def开始）",
        "description": "修改说明"
      }}
    ],
    "delete_methods": ["不需要的方法名1", "不需要的方法名2"]
  }}
  ```

  ```json
  # === CONFIG FILES ===
  {{
    "config_files": [
      {{
        "file_name": "需要修改的配置文件名（例如：simulation_config.yaml）",
        "modifications": [
          {{
            "parameter": "参数名或嵌套路径（如simulation.initial_population）",
            "value": "新值"
          }}
        ]
      }}
    ]
  }}
  ```

  注意：
  - delete_methods/delete_functions 是可选字段
  - 只返回需要修改的文件的JSON块，不要分析和说明
  - 确保JSON格式严格正确
