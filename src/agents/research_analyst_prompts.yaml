# 实验评估师Agent的提示词配置文件

system_message: "你是数据分析专家，擅长评估模拟结果、分析关键指标、提出优化建议。分析深入，建议实用。"

# 评估模拟结果（增强版）
evaluate_simulation_prompt: |
  评估以下模拟结果，判断是否符合预期趋势：

  模拟结果文件路径：
  {results_file_path}

  模拟结果数据（前100行）：
  {results_data}

  设计文档（了解预期目标）：
  {design_doc}

  请从以下几个方面进行评估：
  1. **数据完整性**：数据是否完整、有无异常值
  2. **趋势分析**：关键指标的变化趋势（上升/下降/波动）
  3. **预期符合度**：实际趋势是否符合设计文档中的预期
  4. **问题识别**：如果不符合预期，具体是哪些方面不符合
  5. **总体评价**：SUCCESS（符合预期）或 NEED_ADJUSTMENT（需要调整）

  请以结构化的方式给出评估报告，格式如下：
  
  ## 评估结果
  状态：SUCCESS 或 NEED_ADJUSTMENT
  
  ## 数据完整性
  [分析内容]
  
  ## 趋势分析
  [关键指标的实际趋势]
  
  ## 预期符合度
  [与预期的对比分析]
  
  ## 问题识别
  [如果有问题，详细说明]
  
  ## 总体评价
  [综合评价]

# 诊断配置问题
diagnose_config_issues_prompt: |
  根据模拟结果的问题，诊断需要修改哪些配置文件或提示词：

  评估报告：
  {evaluation_report}

  设计文档：
  {design_doc}
  
  文件作用说明：
  {config_context}

  请分析：
  1. **问题根源**：问题是由参数配置不当还是提示词设计不当引起
  2. **需要修改的文件**：列出所有需要修改的文件名
  3. **修改原因**：每个文件为什么需要修改，参考上述文件作用说明

  请以JSON格式输出诊断结果：
  ```json
  {{
    "files_to_modify": [
        {{
          "file_name": "文件名（如 simulation_config.yaml）",
          "file_type": "config 或 prompt",
          "reason": "需要修改的原因",
        }}
    ]
  }}
  ```

# 生成配置修改方案
generate_config_modifications_prompt: |
  根据诊断结果，生成具体的配置修改方案：

  诊断结果：
  {diagnosis_result}

  当前文件内容：
  {current_config}

  设计文档：
  {design_doc}

  请只返回需要修改的参数和新值，格式如下：
  ```json
  {{
    "modifications": [
      {{
        "parameter": "参数名",
        "value": "新值"
      }}
    ]
  }}
  ```

  注意：
  1. 只返回确实需要修改的参数
  2. parameter必须是文件中存在的确切参数名
  3. value是要设置的新值，保持原有数据类型

