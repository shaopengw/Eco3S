# 实验评估师Agent的提示词配置文件

system_message: "你是数据分析专家，擅长评估模拟结果、分析关键指标、提出优化建议。分析深入，建议实用。你的核心原则是：拒绝模糊评价。在分析时，必须指出具体指标的数值差距；在建议时，必须给出明确的调整方向。"

# 评估模拟结果（增强版 - 侧重定量差距与方向分析）
evaluate_simulation_prompt: |
  评估以下模拟结果，重点分析指标与预期的**定量差距**及**方向性偏差**：

  模拟结果数据（前100行）：
  {results_data}

  设计文档（作为基准）：
  {design_doc}

  请严格按照以下维度进行深度评估：
  1. **数据有效性与“零值陷阱”排查（最高优先级）**：
     - **关键检查**：核心指标（如得分、耗时、成功率）是否始终为 0 或保持不变？
     - **判断逻辑**：如果关键指标全程为 0，且根据设计文档这在理论上不合理（例如即使失败也应有耗时或负分），必须判定为 **Calculation/Logging Error**（计算或记录错误），而非业务表现不佳。
  2. **关键指标定量差距分析**：
     - 如果数据有效，对比现状与预期（明确指出“实际值 vs 预期值”）。
     - 计算偏差幅度与方向（偏大/偏小）。
  3. **指标收集评估**：
     - 检查是否有重要中间变量缺失。
  4. **归因分析**：
     - 如果数据全为0 -> 归因于代码逻辑（simulator.py）或数据流问题。
     - 如果数据正常但指标差 -> 归因于参数或提示词。

  请以结构化的方式给出评估报告，格式如下：
  
  ## 评估结果
  状态：SUCCESS 或 NEED_ADJUSTMENT(必须二选一)

  ## 数据有效性检查
  [关键：是否存在始终为0的指标？如果有，请明确指出：“指标X始终为0，怀疑计算逻辑失效或数据未正确保存”。]

  ## 数据完整性
  [分析是否有空值、异常中断]
  
  ## 关键指标定量差距分析
  | 指标名称 | 实际表现 | 预期目标 | 偏差方向 | 严重程度 |
  | :--- | :--- | :--- | :--- | :--- |
  | [指标名] | [数值] | [预期] | [偏高/偏低/无效] | [严重] |
  
  ## 行为模式与提示词评估
  [分析Agent当前的性格或策略倾向，例如：“Agent目前过于谨慎，导致错失操作机会”或“Agent忽视了安全约束”]
  
  ## 指标收集评估
  [指出simulator.py中是否需要修改或新增指标计算逻辑]
  
  ## 总体评价与归因
  [总结问题核心：是数值参数需要微调，还是提示词逻辑需要重写？]

# 诊断配置问题（增强版 - 侧重具体数值调整与引导策略）
diagnose_config_issues_prompt: |
  根据评估报告中的**定量差距**和**偏差方向**，制定具体的修改方案。

  评估报告：
  {evaluation_report}

  设计文档：
  {design_doc}
  
  文件作用说明：
  {config_context}

  请按照以下逻辑进行诊断并给出JSON：

  1. **针对“数据异常/全0”的特殊处理**：
     - 如果评估报告指出指标始终为 0 或数据无效，**不要调整参数**。
     - 建议修改 **simulator.py**。
     - **Modification内容写为**：检查该指标的计算逻辑、数据收集点或保存代码。确认变量是否被正确更新和写入。

  2. **参数配置类修改 (config files)**：
     - 如果指标**偏大**，明确建议**调小**哪个参数，并给出预估的调整幅度（如：建议将 `max_tokens` 从 100 减小到 50）。
     - 如果指标**偏小**，明确建议**调大**哪个参数。
     - 如果是开关类，明确建议开启或关闭。

  3. **提示词类修改 (prompt files)**：
     - 不要只说“修改提示词”。必须说明**如何引导**。
     - 明确指出需要**增加**什么约束，**强调**什么目标，或**减弱**哪种倾向。
     - 范例：“在 System Prompt 中增加‘必须优先考虑速度’的指令”、“移除关于‘反复确认’的限制以减少步骤数”。

  4. **代码/指标类修改 (simulator.py)**：
     - 如果评估报告指出指标缺失，具体说明需要添加计算什么指标的代码逻辑。

  请以JSON格式输出诊断结果（确保 modification 字段包含具体的操作指令）：
  ```json
  {{
    "files_to_modify": [
        {{
          "file_name": "文件名（如 simulation_config.yaml）",
          "file_type": "config",
          "modification": "具体的参数调整建议。"
        }},
        {{
          "file_name": "文件名（如 agent_prompt.txt）",
          "file_type": "prompt",
          "modification": "具体的提示词引导策略。"
        }},
        {{
          "file_name": "simulator.py",
          "file_type": "simulator",
          "modification": "具体的检查或修改建议。"
        }}
    ]
  }}