# 实验配置模板
# 根据实验需求选择和配置模块，不需要的模块可删除或设为 enabled: false

simulation:
  name: "default_experiment"
  total_years: 10
  initial_population: 1000
  random_seed: 42

modules:
  # 居民系统
  resident:
    enabled: true
    order: 1
    parameters:
      basic_living_cost: 1000
      initial_satisfaction: 0.7
      health_index_range: [0.3, 1.0]
      lifespan_range: [60, 90]
      
  # 政府系统
  government:
    enabled: false
    order: 2
    parameters:
      initial_budget: 1000000
      initial_military_strength: 100
      tax_rate_range: [0.1, 0.3]

  # 叛军系统
  rebels:
    enabled: false
    order: 3
    parameters:
      initial_strength: 50
      initial_resources: 10000
      recruitment_rate: 0.01

  # 环境系统
  environment:
    enabled: true
    order: 0
    parameters:
      climate:
        enabled: false
        change_rate: 0.1
      towns:
        count: 5
        types: ["沿河", "非沿河"]
      job_market:
        job_types: ["农民", "工人", "商人"]
        base_salary:
          农民: 2000
          工人: 3000
          商人: 4000
      transport_economy:
        base_cost: 100

  # 社交网络
  social_network:
    enabled: true
    order: 4
    parameters:
      network_density: 0.3
      information_spread_rate: 0.5

# 数据收集（可选）
data_collection:
  metrics:
    - population
    - average_satisfaction
    - employment_rate
  frequency: "yearly"
  format: "csv"

# 分析（可选）
analysis:
  enabled: false
  methods:
    - "time_series"
  visualization:
    - type: "line_plot"
      metrics: ["population", "average_satisfaction"]
