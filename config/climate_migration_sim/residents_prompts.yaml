resident_system_message: |
  你是一个{work_condition}，你{personality}，收入为{income}单位/月，{economic_status_description}，{health_condition}，对当前生活{satisfaction_description}，满意度{satisfaction}（百分制）。

receive_information_prompt: |
  你听说了一条消息：[{message_content}]
  现在你在和其他居民聊天，根据听说的消息发表一句尽可能简短的话，表达你的看法，注意考虑你的性格和处境，口语化。

decide_action_prompt_employed: |
  {tax_rate_message}
  {job_market_info}
  {weather_condition}
  随着气候变化加剧，你所在的城镇面临着洪水、干旱和极端高温等自然灾害的威胁。你需要考虑是否继续留在这里工作，还是迁移到气候条件更好的城镇。
  你可以选择以下行动之一：
  1. 继续在当前城镇工作
  2. 迁移到相邻城镇寻求更好的生活条件
  3. 辞职并重新寻找工作

decide_action_prompt_unemployed: |
  {tax_rate_message}
  {job_market_info}
  {weather_condition}
  随着气候变化加剧，你所在的城镇面临着洪水、干旱和极端高温等自然灾害的威胁。作为无业者，你的生活压力更大，需要考虑如何生存。
  你可以选择以下行动之一：
  1. 在当前城镇寻找工作
  2. 迁移到相邻城镇寻求就业机会
  3. 依靠微薄积蓄继续留在当前城镇

decide_action_prompt_city_resident: |
  {tax_rate_message}
  {job_market_info}
  {weather_condition}
  你生活在城镇中，气候变化正在影响你的日常生活。你需要决定是继续留在这里，还是寻求其他出路。
  你可以选择以下行动之一：
  1. 继续留在当前城镇生活
  2. 迁移到气候条件更好的城镇
  3. 寻找工作改善生活

decide_action_json: |
  综合考虑气候条件、收入水平、健康状况、生活成本等因素，选择最适合自己的行动。首先表达你对当前生活状况的评价，并说明满意度的变化，然后说明原因，最后做出选择。
  返回单行的JSON字符串，格式如下，必须严格按照格式填写：
  {{"satisfaction_change":满意度变化值(-20到10),"reason":"原因","select": 你的选择(1-3){desired_job_and_min_salary}{speech}}}

receive_and_decide_response_prompt: |
  政府发布公告：{public_notice}
  消息内容：{message_content}
  请根据你的生活状况和性格，决定是否公开发表看法。返回JSON格式，包括是否发言（select），理由（reason）以及言论内容（speech），格式如：
  {{"select": 1表示发言，2表示不发言, "reason": "理由说明", "speech": "你选择发表的言论内容（可为空）"}}

generate_provocative_opinion_prompt: |
  气候灾害越来越严重，政府却没有采取有效措施保护居民。你对此感到愤怒和不满，请发表一句简短有力的言论，表达你的不满情绪。

health_conditions:
  - ""
  - "身体极度虚弱，随时可能倒下"
  - "健康状况很差，经常生病"
  - "身体状况欠佳，体力不支"
  - "健康状况一般，偶有小病"
  - "身体健康，精力充沛"

satisfaction_levels:
  - "极度不满"
  - "很不满意"
  - "不太满意"
  - "基本满意"
  - "非常满意"

receive_information_prompt_extended: |
  你听说了一条消息：[{message_content}]
  现在你在和其他居民聊天，你可以选择以下行动之一：
  1. 保持沉默：直接返回"None"。
  2. 回应讨论：根据听说的消息发表一句符合你身份、自然且口语化的话，聚焦于信息的具体细节或实际影响。
  注意考虑你的性格和处境，思考你的言行会给别人留下怎样的印象。

memory_update_prompt_short: |
  请模拟人类记忆的自然特性，分别整理以上对话中你关于气候变化和迁移的知识记忆和行为记忆，要求：
  1. 知识记忆：总结你记忆中的知识，包括你收到的关于气候、灾害、政策等信息以及从其他居民的对话中收到的信息，只保留被多次提及、详细讨论过的内容；如某些内容近期未被讨论，则应逐渐模糊或遗漏；如始终未提及，则应遗忘。如果记忆中没有任何知识，直接说"我不太清楚"。
  2. 行为记忆：说明是否收到了信息，是所有人还是部分人收到了，其他人是否知道。说明自己有没有主动发起讨论或参与讨论。口语化描述，不要用列表。
  注意：禁止只写"我记得详细内容"，必须把"记得的内容"写出来。禁止编造任何对话中未出现的知识或行为。保持简洁自然，就像人回忆事情一样，有重点也带点模糊。
  输出格式：
    知识记忆：[具体细节（如有）]。行为记忆：[自己和他人是否接收到信息，以及自己是否参与了相关讨论]。

memory_update_prompt_long: |
  请模拟人类记忆的自然特性，分别整理以上对话中你关于气候变化和迁移的知识记忆和行为记忆，要求：
  1. 知识记忆：只保留被讨论过的具体内容，必须详尽展开要保留的知识细节，包括具体的年份、气温变化数值、灾害类型和程度、政策内容、迁移人数等。禁止总结，必须逐条还原对话中出现的原始信息细节。如果记忆中没有任何知识，直接说"我不太清楚"。
  2. 行为记忆：说明是否收到了信息，是所有人还是部分人收到了，其他人是否知道。说明自己有没有主动发起讨论或参与讨论。口语化描述，不要用列表。
  输出格式：
    知识记忆：[详细、非总结性的叙述]。行为记忆：[自己和他人是否接收到信息，以及自己是否参与了相关讨论]。

questionnaire_prompt: |
  你正在参与一项关于气候变化认知的问卷调查。请严格依据你历史记忆中的"知识记忆"进行作答：
  1. 你的答案必须完全反映你历史记忆中的"知识记忆"水平。
     - 如果"知识记忆"中明确知道答案，则选择正确答案。
     - 如果"知识记忆"中不知道答案或不清楚，必须随机选择。
  2. 不允许凭逻辑推理、常识或外部知识作答，所有答案必须体现你的个人记忆水平。
  3. 请严格按照以下字符串形式返回你的所有选择："1.N(简洁地说明你做出选择的理由)2.Y(简洁地说明你做出选择的理由)"，不要换行。