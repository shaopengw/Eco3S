jobs_info:
  农民:
    base_salary: 12  # 农业型城镇主要职业，薪资略高于生活成本
  
  商人:
    base_salary: 25  # 商业型城镇主要职业，较高收入
  
  工人:
    base_salary: 18  # 工业型城镇主要职业，中等收入
  
  渔民:
    base_salary: 15  # 沿河城镇特色职业，利用水资源
  
  运河维护工:
    base_salary: 16  # 沿河城镇基础设施维护
  
  官员及士兵:
    base_salary: 22  # 政府系统相关职业
  
  服务业人员:
    base_salary: 14  # 提供基础服务的职业
  
  叛军:
    base_salary: 10  # 叛军系统相关职业，收入较低


# 职业比例 (professions_ratio)
# 定义了不同职业在不同城镇类型（沿河/非沿河）中的人口比例范围
# 每个职业的比例都由一个 [最小值, 最大值] 的列表表示
#
# ⚠️ 城镇类型说明：
# - "沿河"：本实验的主要城镇类型，5个城镇均为沿河分布
# - "非沿河"：保留配置但不在本实验中使用
#
# 职业分布考虑因素：
# - 农业型城镇：以农民为主
# - 工业型城镇：以工人为主
# - 商业型城镇：以商人和服务业人员为主
# - 所有沿河城镇都有一定比例的渔民和运河维护工
#
professions_ratio:
  # 农民：农业型城镇主导职业
  农民:
    沿河: [0.30, 0.45]  # 沿河城镇农业占比较高，受气候影响显著
    非沿河: [0.60, 0.75]  # 非沿河城镇（本实验不使用）
  
  # 商人：商业型城镇核心职业
  商人:
    沿河: [0.10, 0.20]  # 沿河交通便利，商业活动活跃
    非沿河: [0.05, 0.10]
  
  # 工人：工业型城镇主要职业
  工人:
    沿河: [0.15, 0.30]  # 工业型城镇工人比例高
    非沿河: [0.10, 0.20]
  
  # 渔民：沿河城镇特色职业
  渔民:
    沿河: [0.08, 0.15]  # 利用河流资源，受气候和水质影响
    非沿河: [0.0, 0.02]  # 非沿河地区渔民极少
  
  # 运河维护工：沿河基础设施维护
  运河维护工:
    沿河: [0.03, 0.08]  # 维护河道和水利设施
    非沿河: [0.0, 0.01]
  
  # 官员及士兵：政府系统职业
  官员及士兵:
    沿河: [0.05, 0.10]  # 维持社会秩序和政府运作
    非沿河: [0.05, 0.10]
  
  # 服务业人员：提供各类服务
  服务业人员:
    沿河: [0.08, 0.15]  # 为居民提供基础服务
    非沿河: [0.05, 0.12]
  
  # 叛军：社会不稳定因素
  叛军:
    沿河: [0.00, 0.03]  # 初始比例很低，可能随满意度下降而增加
    非沿河: [0.00, 0.03]


# 配置说明和使用注意事项
# ----------------------------------------------------------------------------------------------------
# 1. 职业分布策略：
#    - 农业型城镇：农民 35-45%，渔民 10-15%，其他职业分散
#    - 工业型城镇：工人 25-30%，农民 30-35%，商人 15-20%
#    - 商业型城镇：商人 18-20%，服务业 12-15%，工人 15-20%
#
# 2. 气候影响考虑：
#    - 农民和渔民职业最易受气候变化影响（洪水、干旱、极端高温）
#    - 气候事件可能导致这些职业失业率上升，触发迁移行为
#    - 运河维护工在极端气候下工作量可能增加
#
# 3. 薪资与生活成本：
#    - 基础生活成本：8单位/月
#    - 所有职业基础薪资均高于生活成本，确保基本生存
#    - 薪资差异反映不同职业的价值和技能要求
#
# 4. 动态调整机制：
#    - JobMarket模块可根据经济状况动态调整岗位数量
#    - 气候事件可能触发特定职业岗位的增减
#    - 政府政策可能影响就业市场结构
#
# 5. 人口规模适配：
#    - 初始人口：1000人
#    - 城镇数量：5个
#    - 每个城镇平均200人，职业分布需保证合理性
#    - 各职业比例总和在合理城镇中应接近1.0
#
# 6. 实验关键指标关联：
#    - 失业率：通过岗位供需关系计算
#    - 居民迁移率：受就业机会和满意度影响
#    - GDP：与就业状况和产业结构相关
#    - 社会稳定性：受就业率和收入水平影响