# message_config.yaml
# 气候迁移模拟实验 - 消息配置文件
# 实验名称: climate_migration_sim

# ============================================
# 政府宣传消息配置
# ============================================

# 短消息（用于快速传播，3-5条）
propaganda_message_short: |
  1. 【气候预警】政府提醒：持续关注气候变化，做好防灾准备。
  2. 【就业信息】各城镇提供就业支持，鼓励居民就近就业。
  3. 【迁移补贴】符合条件的居民可申请迁移补助和安置费用。
  4. 【社区建设】加强城镇基础设施建设，改善居住环境。
  5. 【健康保障】免费提供气候相关健康检查和医疗服务。

# 长消息（用于详细说明，5-10条）
propaganda_message_long: |
  1. 【气候适应计划】政府正在实施气候适应战略，包括加强防洪设施、改善供水系统、建设避暑设施等措施。
  2. 【就业扶持政策】为受气候影响的居民提供职业培训、就业推荐和创业补贴，帮助大家适应新环境。
  3. 【迁移安置方案】对于因气候原因需要迁移的居民，政府提供搬迁补助、住房安置和过渡期生活补贴。
  4. 【资源分配优化】根据各城镇气候条件，合理调配水资源、能源和生活物资，确保供应稳定。
  5. 【社区互助网络】建立社区互助机制，鼓励居民互帮互助，共同应对气候挑战。
  6. 【税收优惠政策】对气候脆弱地区的居民和企业实施税收减免，降低生活和经营成本。
  7. 【信息透明公开】定期发布气候监测数据、城镇发展状况和政策实施进展，保障居民知情权。
  8. 【长期发展规划】制定百年气候适应规划，确保城镇可持续发展和居民福祉。

# ============================================
# 气候预警消息配置
# ============================================

# 气候极端事件预警消息
climate_warning_messages:
  flood: |
    【洪水预警】
    受持续降雨影响，沿河城镇可能发生洪涝灾害。
    请居民：
    - 关注水位变化，做好撤离准备
    - 转移贵重物品到高处
    - 储备必要生活物资
    - 听从政府统一调度安排
  
  drought: |
    【干旱预警】
    长期高温少雨，部分地区面临干旱威胁。
    请居民：
    - 节约用水，合理安排生活
    - 关注农作物生长情况
    - 做好饮用水储备
    - 注意防暑降温
  
  extreme_heat: |
    【高温预警】
    未来持续出现极端高温天气。
    请居民：
    - 减少户外活动，避免中暑
    - 老人和儿童加强防护
    - 注意用电安全，防止火灾
    - 及时补充水分和盐分

# ============================================
# 社交网络消息配置
# ============================================

# 居民间信息传播模板
social_network_messages:
  migration_experience: |
    【迁移经验分享】
    我最近搬到了[目标城镇]，这里[气候条件]比原来[好/差]，
    生活成本[高/低]了大约[百分比]，工作机会[多/少]。
    总体满意度：[分数]/100
  
  job_information: |
    【就业信息】
    听说[城镇名称]的[行业类型]正在招人，
    工资待遇[薪资范围]，需要[技能要求]。
    有兴趣的朋友可以去了解一下。
  
  climate_observation: |
    【气候观察】
    最近明显感觉到[气候变化描述]，
    对日常生活的影响主要是[具体影响]。
    大家要注意[应对建议]。
  
  satisfaction_feedback: |
    【生活感受】
    在[城镇名称]生活了[时长]，
    对[方面]比较满意，但[方面]还需要改善。
    整体打分：[分数]/100

# ============================================
# 叛军/反对组织消息配置
# ============================================

# 叛军宣传消息（如果启用叛军系统）
rebels_message_short: |
  1. 【真相揭露】政府隐瞒气候数据，实际情况比公布的更严重！
  2. 【资源不公】精英阶层占据最佳居住区，普通居民被迫承受恶劣环境！
  3. 【政策质疑】迁移补助杯水车薪，根本无法解决实际困难！
  4. 【团结呼吁】只有团结起来，才能争取到应有的权益和保障！

rebels_message_long: |
  1. 【气候真相】政府公布的气温数据被美化，实际升温速度是官方数据的2-3倍，极端事件频率也被低估。
  2. 【资源垄断】优质土地和水资源被权贵阶层控制，普通居民只能在边缘地带艰难生存。
  3. 【迁移陷阱】所谓的迁移补助政策漏洞百出，大量补贴被中间环节截留，真正到居民手中的微乎其微。
  4. 【就业歧视】新的就业机会优先分配给关系户，普通居民失业率远高于官方统计数字。
  5. 【税负不均】富裕阶层享受税收豁免，沉重税负全部压在工薪阶层身上。
  6. 【集体行动】我们呼吁所有受压迫的居民团结起来，通过合法途径争取公平待遇和生存权利！

# ============================================
# 系统通知消息配置
# ============================================

# 系统事件通知
system_notifications:
  year_start: |
    ======================================
    模拟年份：第 {year} 年
    当前人口：{population} 人
    平均气温：{temperature}°C (较基准 +{delta}°C)
    ======================================
  
  migration_event: |
    【迁移事件】{count} 名居民从 {from_town} 迁移到 {to_town}
    主要原因：{reason}
  
  economic_update: |
    【经济数据】
    GDP: {gdp} 单位
    失业率: {unemployment_rate}%
    平均收入: {average_income} 单位/月
  
  climate_milestone: |
    【气候里程碑】
    全球平均气温已上升 {delta}°C
    {event_description}

# ============================================
# 消息传播参数配置
# ============================================

message_propagation:
  # 信息传播概率（来自设计文档）
  base_spread_probability: 0.6
  
  # 不同消息类型的传播系数
  spread_coefficients:
    government_official: 0.9      # 政府官方消息
    social_personal: 0.6          # 个人社交消息
    rebels_underground: 0.4       # 叛军地下消息
    climate_warning: 1.0          # 气候预警消息
  
  # 消息衰减参数
  decay_rate: 0.1                 # 每次传播衰减10%
  max_hops: 5                     # 最大传播跳数
  
  # 群体互动阈值（来自设计文档）
  group_interaction_threshold: 0.5

# ============================================
# 消息效果配置
# ============================================

message_effects:
  # 政府消息对居民满意度的影响
  government_satisfaction_impact:
    positive_message: 2           # 积极消息 +2 满意度
    neutral_message: 0            # 中性消息 0
    negative_message: -1          # 负面消息 -1
  
  # 叛军消息对居民满意度的影响
  rebels_satisfaction_impact:
    anti_government: -3           # 反政府消息 -3 满意度
    pro_residents: 1              # 支持居民消息 +1
  
  # 气候预警对居民决策的影响权重
  climate_warning_weight: 0.3     # 占迁移决策权重的30%
  
  # 社交信息对居民决策的影响权重
  social_info_weight: 0.2         # 占迁移决策权重的20%