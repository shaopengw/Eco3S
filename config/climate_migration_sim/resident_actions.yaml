actions:
  1:
    name: "continue_current_job"
    description: "继续在当前城镇工作"
    function: "handle_work"
    is_async: false
    parameters:
      - name: "desired_job"
        type: "string"
        required: false
        description: "期望的工作类型"
      - name: "min_salary"
        type: "number"
        required: false
        description: "可接受的最低薪资"
    
  2:
    name: "migrate"
    description: "迁移到相邻城镇"
    function: "migrate_to_new_town"
    is_async: true
    parameters:
      - name: "map"
        type: "object"
        required: true
        default: null
        description: "地图对象，用于确定迁移目标"
      - name: "update_job"
        type: "boolean"
        required: false
        default: true
        description: "是否更新职业，如果为false则保留原职业"
    
  3:
    name: "find_new_job"
    description: "寻找新工作"
    function: "handle_work"
    is_async: false
    parameters:
      - name: "desired_job"
        type: "string"
        required: false
        description: "期望的工作类型"
      - name: "min_salary"
        type: "number"
        required: false
        description: "可接受的最低薪资"