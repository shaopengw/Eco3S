climate:
  enabled: false
  market_environment:
    base_condition: normal
    event_probability: 0.1
    volatility_events: true
data:
  climate_info_path: experiment_dataset/climate_data/climate.csv
  government_info_path: experiment_dataset/government_data/official_data.json
  government_prompt_path: config/financial_herd_behavior_sim/government_prompts.yaml
  jobs_config_path: config/financial_herd_behavior_sim/jobs_config.yaml
  message_config_path: config/financial_herd_behavior_sim/message_config.yaml
  questionnaire_path: config/financial_herd_behavior_sim/questionnaire.yaml
  rebellion_info_path: experiment_dataset/rebellion_data/rebels_data.json
  rebels_prompt_path: config/financial_herd_behavior_sim/rebels_prompts.yaml
  resident_actions_path: config/financial_herd_behavior_sim/resident_actions.yaml
  resident_info_path: experiment_dataset/resident_data/resident_data.json
  resident_prompt_path: config/financial_herd_behavior_sim/residents_prompts.yaml
  towns_data_path: config/financial_herd_behavior_sim/towns_data.json
data_collection:
  enabled: true
  frequency: daily
  metrics:
  - asset_price_volatility
  - trading_frequency
  - investor_portfolio_concentration
  - herd_behavior_index
  - market_sentiment
  output_format: csv
  output_path: output/financial_herd_behavior_sim
experiment:
  description: 验证金融市场上的羊群效应
  expected_outcome: 观察到投资者群体的集中行为导致资产价格剧烈波动
  key_indicators:
    concentration_alert_level: 0.7
    herd_behavior_detection: true
    price_volatility_threshold: 0.05
  limitations:
  - 模型简化了市场交易规则
  - 不考虑投资者间的信息不对称
  - 简化了资产种类多样性
  - 未考虑外部宏观经济因素
  name: financial_herd_behavior_sim
  research_hypothesis: 投资者会受到羊群效应影响导致市场波动加剧
job_market:
  base_salary:
    保守型投资者: 80000
    平衡型投资者: 120000
    激进型投资者: 150000
  job_types:
  - 保守型投资者
  - 平衡型投资者
  - 激进型投资者
  unemployment_rate: 0.0
logging:
  console_output: true
  level: INFO
  log_file: logs/financial_herd_behavior_sim.log
map:
  height: 100
  location_sigma: 5.0
  max_connection_distance: 50
  navigability: 1.0
  width: 100
resident:
  basic_living_cost: 0
  decision_making_style: herd_influenced
  health_index_range:
  - 0.8
  - 1.0
  initial_satisfaction: 0.7
  lifespan_range:
  - 1000
  - 1000
simulation:
  birth_rate: 0.0
  financial_params:
    asset_types:
    - 股票
    - 债券
    - 期货
    base_asset_price: 100.0
    information_channels:
    - 新闻媒体
    - 社交网络
    initial_asset_count: 10
    price_volatility: 0.02
  group_decision:
    government:
      enabled: 1
      max_rounds: 2
    rebellion:
      enabled: 0
      max_rounds: 2
  initial_population: 1000
  investor_params:
    cognitive_bias_level: 0.6
    herd_behavior_threshold: 0.5
    initial_capital_range:
    - 50000
    - 200000
    risk_preference_range:
    - 0.3
    - 0.9
    trading_frequency_base: 0.3
  map_height: 100
  map_width: 100
  max_retry_attempts: 3
  message_type: S
  response_probability: 0.8
  resume_from_cache: 0
  retry_delay: 1
  seed_count: 2
  simulation_name: financial_herd_behavior_sim
  social_network:
    influence_decay: 0.1
    information_spread_rate: 0.5
    max_connections: 10
    network_density: 0.3
  start_year: 1
  time:
    total_steps: 20
    total_years: 20
  total_years: 20
towns:
  count: 3
  initial_resources: 1000000
  market_characteristics:
    主板市场:
      liquidity: 0.9
      volatility: 0.015
    创业板市场:
      liquidity: 0.6
      volatility: 0.035
    期货市场:
      liquidity: 0.7
      volatility: 0.05
  types:
  - 主板市场
  - 创业板市场
  - 期货市场
