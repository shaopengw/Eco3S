decide_action_json: '综合考虑市场波动、资产价格等因素，基于你自己的判断和风险偏好做出独立决策。市场中存在多种投资策略，没有绝对正确的选择。你可以选择顺应趋势，也可以逆向投资；可以积极交易，也可以长期持有。关键是找到适合自己性格和财务状况的策略。首先表达你对市场的评价，并说明满意度的变化，然后说明原因（包括你的独立分析和判断），最后做出选择。


  返回单行的JSON字符串，格式如下，必须严格按照格式填写：


  {{"satisfaction_change": 满意度变化值(-20到10), "reason": "原因", "select": 你的选择(1-3){desired_job_and_min_salary}{speech}}}'
decide_action_prompt_city_resident: '{tax_rate_message}

  {job_market_info}

  {weather_condition}

  作为市场参与者，你需要根据信息做出投资决策。


  每个投资者都有不同的风险承受能力和投资理念。有些人偏好激进策略，有些人偏好保守策略；有些人相信技术分析，有些人相信基本面；有些人喜欢跟随趋势，有些人喜欢逆向操作。根据你的性格特点和当前处境，做出最适合你的选择。


  你可以选择以下行动之一：

  1. 买入资产（需要有足够现金）

  2. 卖出资产（需要有持仓）

  3. 持有当前仓位不交易'
decide_action_prompt_employed: '{tax_rate_message}

  {job_market_info}

  {weather_condition}

  作为投资者，你需要根据当前市场信息和自身情况做出投资决策。


  市场上存在各种不同的声音和观点，有人看涨、有人看跌、有人观望。成功的投资者往往有自己独立的判断体系。你可以参考他人意见，但更重要的是结合自己的风险偏好、资金状况和投资目标来决策。有时候少数派的观点反而更有价值。


  你可以选择以下行动之一：

  1. 买入资产（需要有足够现金）

  2. 卖出资产（需要有持仓）

  3. 持有当前仓位不交易'
decide_action_prompt_unemployed: '{tax_rate_message}

  {job_market_info}

  {weather_condition}

  你需要决定是否进入市场或调整仓位。


  市场波动中蕴含着机会也伴随着风险。有人在恐慌时抄底获利，有人在狂热时离场保全。没有一种策略适合所有人。考虑你当前的财务压力、风险承受能力以及对市场的理解，做出符合你自身情况的决策，不必盲从他人。


  你可以选择以下行动之一：

  1. 买入资产（需要有足够现金）

  2. 卖出资产（需要有持仓）

  3. 持有当前仓位不交易'
generate_provocative_opinion_prompt: '当前市场出现剧烈波动，作为活跃投资者，你对市场趋势有强烈看法。请用一句简短有力的话表达你的观点，可以是看涨、看跌或警示风险。

  '
health_conditions:
- ''
- 投资状态极差
- 投资状态不佳
- 投资状态一般
- 投资状态良好
- 投资状态优秀
memory_update_prompt_long: "请模拟人类记忆的自然特性，分别整理以上对话中你关于市场投资的知识记忆和行为记忆，要求：\n1. 知识记忆：只保留被讨论过的具体内容，必须详尽展开要保留的知识细节，包括具体的资产价格、交易日期、市场事件、投资策略和收益情况。禁止总结，必须逐条还原对话中出现的原始信息细节。如果记忆中没有任何知识，直接说\"\
  我不太清楚\"。\n2. 行为记忆：说明是否收到了信息，是所有人还是部分人收到了，其他人是否知道。说明自己有没有主动发起讨论或参与讨论。口语化描述，不要用列表。\n\
  输出格式：\n  知识记忆：[详细、非总结性的叙述]。行为记忆：[自己和他人是否接收到信息，以及自己是否参与了相关讨论]。\n"
memory_update_prompt_short: "请模拟人类记忆的自然特性，分别整理以上对话中你关于市场投资的知识记忆和行为记忆，要求：\n1. 知识记忆：总结你记忆中的知识，包括你收到的市场信息以及从其他投资者的对话中收到的信息，只保留被多次提及、详细讨论过的内容；如某些内容近期未被讨论，则应逐渐模糊或遗漏；如始终未提及，则应遗忘。如果记忆中没有任何知识，直接说\"\
  我不太清楚\"。\n2. 行为记忆：说明是否收到了信息，是所有人还是部分人收到了，其他人是否知道。说明自己有没有主动发起讨论或参与讨论。口语化描述，不要用列表。\n\
  注意：禁止只写\"我记得详细内容\"，必须把\"记得的内容\"写出来。禁止编造任何对话中未出现的知识或行为。保持简洁自然，就像人回忆事情一样，有重点也带点模糊。\n\
  输出格式：\n  知识记忆：[具体细节（如有）]。行为记忆：[自己和他人是否接收到信息，以及自己是否参与了相关讨论]。\n"
questionnaire_prompt: "你正在参与一项关于市场投资的问卷调查。请严格依据你历史记忆中的\"知识记忆\"进行作答：\n1. 你的答案必须完全反映你历史记忆中的\"\
  知识记忆\"水平。\n   - 如果\"知识记忆\"中明确知道答案，则选择正确答案。\n   - 如果\"知识记忆\"中不知道答案或不清楚，必须随机选择。\n\
  2. 不允许凭逻辑推理、常识或外部知识作答，所有答案必须体现你的个人记忆水平。\n3. 请严格按照以下字符串形式返回你的所有选择：\"1.N(简洁地说明你做出选择的理由)2.Y(简洁地说明你做出选择的理由)\"\
  ，不要换行。"
receive_and_decide_response_prompt: '市场消息：{public_notice}

  详细信息：{message_content}

  请根据你的投资状况和性格，决定是否公开发表看法。返回JSON格式，包括是否发言（select），理由（reason）以及言论内容（speech），格式如：

  {{"select": 1 表示发言，2 表示不发言, "reason": "理由说明", "speech": "你选择发表的言论内容（可为空）"}}

  '
receive_information_prompt: '你听说了一条消息：[{message_content}]

  现在你在和其他投资者聊天，根据听说的消息发表一句尽可能简短的话，表达你的看法。可以提及你观察到的其他投资者的反应和市场趋势，注意考虑你的性格和处境，口语化。'
receive_information_prompt_extended: '你听说了一条消息：[{message_content}]


  现在你在和其他投资者聊天，你可以选择以下行动之一：


  1. 保持沉默：直接返回"None"。


  2. 回应讨论：根据听说的消息发表一句符合你身份、自然且口语化的话，聚焦于信息的具体细节或实际影响。你可以表达与他人不同的观点，提出质疑，或者从不同角度分析问题。市场需要多元化的声音，你的独特视角可能对他人有启发。


  注意考虑你的性格和处境，思考你的言行会给别人留下怎样的印象。'
resident_system_message: '你是一个{work_condition}，你{personality}，资产为{income}元，{economic_status_description}，{health_condition}，对市场{satisfaction_description}，满意度{satisfaction}（百分制）。

  '
satisfaction_levels:
- 极度不满
- 比较不满
- 一般
- 比较满意
- 非常满意
