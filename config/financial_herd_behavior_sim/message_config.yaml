market_message_short: |
  1. 市场近期出现显著波动，多数投资者正在调整投资组合
  2. 某热门投资品种价格快速上涨，吸引大量关注
  3. 邻近投资者纷纷采取相似的投资策略
  4. 市场情绪高涨，投资活动频繁
  5. 部分投资者获得可观收益，引发跟风效应

# 市场信息传播消息（长）
market_message_long: |
  1. 市场价格波动加剧，投资者情绪受到明显影响
  2. 多个投资者报告其投资组合收益率显著变化
  3. 社交网络中广泛传播某投资策略的成功案例
  4. 观察到大量投资者做出相似的买入或卖出决策
  5. 市场信息在投资者群体中快速扩散
  6. 早期采纳某策略的投资者展示了投资回报
  7. 羊群效应开始显现，更多人跟随主流投资方向
  8. 市场交易量激增，反映出集体行为特征
  9. 投资者之间相互观察并模仿投资决策
  10. 市场趋势形成自我强化循环

# 投资建议传播消息
investment_advice_short: |
  1. 根据市场趋势调整投资策略可能带来更好回报
  2. 观察成功投资者的决策模式
  3. 考虑跟随当前市场主流投资方向
  4. 及时关注市场信息变化
  5. 评估当前投资组合的风险收益比

investment_advice_long: |
  1. 市场展现出明显的集体行为趋势
  2. 成功投资者的策略值得参考和学习
  3. 当前市场环境下跟随主流可能降低风险
  4. 及时获取和分析市场信息至关重要
  5. 投资决策应考虑其他投资者的行为模式
  6. 羊群效应可能带来短期收益机会
  7. 密切监测市场波动度变化
  8. 社交网络中的信息可能影响投资判断
  9. 评估自身风险承受能力并适时调整策略
  10. 保持对市场整体趋势的敏感度

# 风险警示消息
risk_warning_short: |
  1. 市场波动加剧，投资风险上升
  2. 羊群效应可能导致市场过度反应
  3. 盲目跟风可能造成损失
  4. 建议理性评估投资决策
  5. 注意市场反转风险

risk_warning_long: |
  1. 当前市场呈现高波动性特征，风险显著增加
  2. 大规模羊群效应可能导致价格严重偏离价值
  3. 跟随主流投资策略需谨慎评估风险
  4. 市场情绪化行为可能引发剧烈调整
  5. 过度集中的投资方向存在系统性风险
  6. 信息传播速度快可能导致决策失误
  7. 建议保持独立思考和理性判断
  8. 分散投资以降低羊群效应带来的风险
  9. 警惕市场泡沫形成的可能性
  10. 准备应对市场快速反转的情况

# 市场趋势报告
market_trend_report: |
  1. 投资者数量变化：{investor_count_change}
  2. 市场波动度指数：{volatility_index}
  3. 羊群效应指数：{herd_index}
  4. 平均投资回报率：{average_roi}
  5. 信息传播速度：{info_speed}
  6. 市场情绪指标：{market_sentiment}
  7. 集体行为强度：{collective_behavior_intensity}

# 社交网络传播消息
social_network_message: |
  1. 你的社交网络中有{percentage}%的人采取了相似投资策略
  2. 近期{friend_count}位联系人分享了他们的投资经验
  3. 社交圈内热议的投资机会值得关注
  4. 观察到网络中投资行为的趋同现象
  5. 信息在你的社交圈中快速传播

# 个人投资反馈消息
personal_investment_feedback: |
  1. 你的投资回报率：{personal_roi}
  2. 与市场平均水平比较：{comparison_to_average}
  3. 你的投资策略与主流的相似度：{strategy_similarity}
  4. 建议：{personalized_advice}
  5. 风险评估：{risk_assessment}

# 配置参数
message_config:
  # 信息传播频率（每年触发次数）
  propagation_frequency: 12
  
  # 信息影响力衰减系数
  influence_decay_rate: 0.1
  
  # 不同消息类型的传播概率
  message_probabilities:
    market_short: 0.3
    market_long: 0.15
    investment_advice_short: 0.2
    investment_advice_long: 0.1
    risk_warning_short: 0.15
    risk_warning_long: 0.05
    social_network: 0.05
  
  # 消息触发阈值
  trigger_thresholds:
    high_volatility: 0.7  # 高波动度阈值
    strong_herd_effect: 0.6  # 强羊群效应阈值
    rapid_info_spread: 0.8  # 快速信息传播阈值
  
  # 消息影响范围
  influence_range:
    local: 0.5  # 仅影响直接社交网络
    regional: 0.3  # 影响扩展社交网络
    global: 0.2  # 影响全市场