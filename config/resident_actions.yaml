
# 居民行为配置
actions:
  1:
    name: "join_rebellion"
    description: "参加叛乱"
    function: "job_market.assign_specific_job_withoutcheck"
    is_async: false
    parameters:
      - name: "job_type"
        type: "string"
        required: true
        default: "叛军"
        description: "要分配的工作类型"
    
  2:
    name: "migrate"
    description: "迁移到新城镇"
    function: "migrate_to_new_town"
    is_async: true
    parameters:
      - name: "map"
        type: "object"
        required: true
        default: null
        description: "地图对象"
      - name: "update_job"
        type: "boolean"
        required: false
        default: true
        description: "是否更新职业，如果为false则保留原职业"
    
  3:
    name: "work"
    description: "寻找工作或继续工作"
    function: "handle_work"
    is_async: false
    parameters:
      - name: "desired_job"
        type: "string"
        required: false
        description: "期望的工作类型"
      - name: "min_salary"
        type: "number"
        required: false
        description: "可接受的最低薪资"