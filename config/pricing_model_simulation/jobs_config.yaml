jobs_info:
  # 生产者 - 负责商品生产和收获
  生产者:
    base_salary: 2500
    
  # 存储管理员 - 负责商品存储和库存管理
  存储管理员:
    base_salary: 2800
    
  # 交易商 - 负责商品交易和价格调整
  交易商:
    base_salary: 3500
    
  # 市场分析师 - 负责需求分析和价格预测
  市场分析师:
    base_salary: 4000
    
  # 物流工人 - 负责商品运输和配送
  物流工人:
    base_salary: 2200


# 职业比例 (professions_ratio)
# 定义了不同职业在城镇中的人口比例范围。
# 每个职业的比例都由一个 [最小值, 最大值] 的列表表示。
#
# ⚠️ 城镇类型说明：
# - 本实验仅使用"非沿河"类型（单一市场环境）
# - 职业比例设计考虑了商品定价模型的核心机制
#
# 注意：所有职业比例总和应在合理范围内（建议0.8-1.0之间，预留失业空间）
professions_ratio:
  # 生产者 - 商品供给的主要来源
  生产者:
    非沿河: [0.35, 0.45]  # 占比最大，确保充足的商品供应
    
  # 存储管理员 - 库存管理的关键角色
  存储管理员:
    非沿河: [0.15, 0.20]  # 重要角色，支持存储技术实现
    
  # 交易商 - 价格调整的执行者
  交易商:
    非沿河: [0.10, 0.15]  # 负责价格发现和市场均衡
    
  # 市场分析师 - 理性预期的体现
  市场分析师:
    非沿河: [0.05, 0.10]  # 较少但关键，代表市场理性
    
  # 物流工人 - 支持商品流通
  物流工人:
    非沿河: [0.10, 0.15]  # 保障商品流通效率


# 使用说明:
# ----------------------------------------------------------------------------------------------------
# 1. 职业设计与实验目标对齐：
#    - 生产者：对应随机收获机制
#    - 存储管理员：对应存储技术和库存约束
#    - 交易商：对应价格调整行为
#    - 市场分析师：对应理性预期
#    - 物流工人：支持整体市场运作
#
# 2. 薪资设定考虑因素：
#    - 基础生活成本：10单位/时段
#    - 初始价格：50单位
#    - 薪资范围：2200-4000，确保居民能够参与市场活动
#
# 3. 职业比例设计原则：
#    - 生产者占比最高（35-45%）：保证商品供应
#    - 存储管理员占比适中（15-20%）：支持存储机制
#    - 交易商和分析师占比较小但关键：实现价格发现
#    - 总比例约75-105%：预留5-25%失业率空间
#
# 4. 与实验参数的关联：
#    - 需求弹性 (0.5)：影响交易商的价格调整策略
#    - 存储成本率 (0.1)：影响存储管理员的决策
#    - 存储折旧率 (0.05)：影响库存管理策略
#    - 模拟时长 (100时段)：足够观察价格序列和库存变化
#
# 5. 关键指标支持：
#    - 均衡价格序列：通过交易商和市场分析师的行为体现
#    - 库存断档概率：通过生产者和存储管理员的协作管理