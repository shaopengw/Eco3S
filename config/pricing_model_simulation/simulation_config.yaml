data:
  climate_info_path: "experiment_dataset/climate_data/climate.csv"
  government_info_path: "experiment_dataset/government_data/official_data.json"
  government_prompt_path: "config/pricing_model_simulation/government_prompts.yaml"
  jobs_config_path: "config/pricing_model_simulation/jobs_config.yaml"
  message_config_path: "config/pricing_model_simulation/message_config.yaml"
  questionnaire_path: "config/pricing_model_simulation/questionnaire.yaml"
  rebellion_info_path: "experiment_dataset/rebellion_data/rebels_data.json"
  rebels_prompt_path: "config/pricing_model_simulation/rebels_prompts.yaml"
  resident_info_path: "experiment_dataset/resident_data/resident_data.json"
  resident_prompt_path: "config/pricing_model_simulation/residents_prompts.yaml"
  resident_actions_path: "config/pricing_model_simulation/resident_actions.yaml"
  towns_data_path: "config/pricing_model_simulation/towns_data.json"

# 模拟参数
simulation:
  # 基础时间设置（原型测试配置）
  start_year: 1  # 模拟开始时间步
  total_years: 30  # 模拟总时间步数（原型测试）
  initial_population: 200  # 初始人口数量（原型测试）
  
  # 定价模型核心参数
  initial_price: 50  # 初始价格（单位）
  demand_elasticity: 0.5  # 需求弹性
  storage_cost_rate: 0.1  # 存储成本率
  storage_depreciation: 0.05  # 存储折旧率
  base_cost: 10  # 基础成本（单位/时段）
  
  # 人口与市场参数
  birth_rate: 0.02  # 出生率（2%）
  
  # 地图设置（单一市场环境）
  map_width: 100
  map_height: 100
  
  # 居民行为参数
  price_adjustment_step: 0.1  # 调整价格幅度（单位）
  storage_capacity: 100  # 存储容量（单位）
  price_sensitivity_range: [0.3, 1.0]  # 价格敏感度范围
  
  # 群体决策配置（定价模型不需要政府和叛乱）
  group_decision:
    government:
      enabled: 0  # 禁用政府决策
      max_rounds: 2
    rebellion:
      enabled: 0  # 禁用叛乱决策
      max_rounds: 2
  
  # 行为参数
  response_probability: 0.8  # 响应概率（居民参与市场交易）
  max_retry_attempts: 3  # 最大重试次数
  retry_delay: 1  # 重试延迟（秒）
  
  # 社交网络参数
  network_density: 0.3  # 网络密度
  information_spread_rate: 0.5  # 信息传播速率
  max_connections: 10  # 最大连接数
  
  # 城镇设置（单一市场）
  town_count: 1  # 城镇数量（单一市场环境）
  initial_town_resources: 100000  # 初始城镇资源
  
  # 地图连接参数
  max_connection_distance: 20  # 最大连接距离
  location_sigma: 2.0  # 位置生成标准差
  navigability: 0.8  # 通航能力
  
  # 可选参数
  resume_from_cache: 0  # 是否从缓存恢复
  simulation_name: "pricing_model_simulation"  # 模拟名称
  message_type: "S"  # 消息类型
  seed_count: 1  # 种子数量

# 数据收集配置
data_collection:
  enabled: true  # 启用数据收集
  metrics:
    - equilibrium_price_sequence  # 均衡价格序列
    - inventory_stockout_probability  # 库存断档概率
    - average_storage_level  # 平均库存水平
    - price_volatility  # 价格波动性
    - demand_satisfaction_rate  # 需求满足率
  frequency: "step"  # 每时间步收集（原型测试用）
  output_format: "csv"  # 输出格式
  output_path: "output/pricing_model_simulation"  # 输出路径

# 居民属性配置
resident:
  basic_living_cost: 10  # 基础生活成本（与base_cost一致）
  initial_satisfaction: 0.7  # 初始满意度
  health_index_range: [0.5, 1.0]  # 健康指数范围
  lifespan_range: [60, 90]  # 寿命范围
  
  # 定价模型特定属性
  initial_inventory: 50  # 初始库存
  purchase_frequency: 1.0  # 购买频率（每时间步）
  storage_strategy: "adaptive"  # 存储策略（自适应）

# 市场环境配置
market:
  market_type: "single_commodity"  # 单一商品市场
  demand_function: "isoelastic"  # 等弹性需求函数
  supply_shock_enabled: false  # 是否启用供给冲击（原型测试禁用）
  supply_shock_probability: 0.0  # 供给冲击概率
  
# 实验设计参数
experiment:
  scenario_name: "baseline"  # 场景名称
  parameter_sweep: false  # 是否进行参数扫描（原型测试禁用）
  random_seed: 42  # 随机种子（可重复性）