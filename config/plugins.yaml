plugins:
- name: map
  module: plugins.map.map_plugin.DefaultMapPlugin
  enabled: true
  metadata:
    version: 1.0.0
    description: 地图管理：空间网格/城镇数据加载
    author: AgentWorld Team
    dependencies: []
  init_params:
    width: 100
    height: 100
    data_file: config/default/towns_data.json
- name: time
  module: plugins.time.time_plugin.DefaultTimePlugin
  enabled: true
  metadata:
    version: 1.0.0
    description: 时间系统：推进模拟年份/步长
    author: AgentWorld Team
    dependencies: []
- name: population
  module: plugins.population.population_plugin.DefaultPopulationPlugin
  enabled: true
  metadata:
    version: 1.0.0
    description: 人口管理：初始化与人口状态追踪
    author: AgentWorld Team
    dependencies: []
- name: towns
  module: plugins.towns.towns_plugin.DefaultTownsPlugin
  enabled: true
  metadata:
    version: 1.0.0
    description: 城镇管理：城镇类型/资源/距离等维护
    author: AgentWorld Team
    dependencies:
    - map
- name: social_network
  module: plugins.social_network.social_network_plugin.DefaultSocialNetworkPlugin
  enabled: true
  metadata:
    version: 1.0.0
    description: 社交网络：关系构建与信息传播网络
    author: AgentWorld Team
    dependencies:
    - population
- name: climate
  module: plugins.climate.climate_plugin.DefaultClimatePlugin
  enabled: true
  metadata:
    version: 1.0.0
    description: 气候影响：环境变化驱动与数据接入
    author: AgentWorld Team
    dependencies:
    - map
    - time
  init_params:
    climate_data_path: experiment_dataset/climate_data/climate.csv
- name: transport_economy
  module: plugins.transport_economy.transport_economy_plugin.DefaultTransportEconomyPlugin
  enabled: true
  metadata:
    version: 1.0.0
    description: 运输经济：城镇间交通成本/可达性影响
    author: AgentWorld Team
    dependencies:
    - map
- name: job_market
  module: plugins.job_market.job_market_plugin.DefaultJobMarketPlugin
  enabled: true
  metadata:
    version: 1.0.0
    description: 就业市场：岗位配置/就业状态与工资基础
    author: AgentWorld Team
    dependencies: []
- name: government
  module: plugins.government.government_plugin.DefaultGovernmentPlugin
  enabled: true
  metadata:
    version: 1.0.0
    description: 政府系统：预算/税收/政策/信息发布
    author: AgentWorld Team
    dependencies:
    - map
    - time
    - towns
    - transport_economy
- name: rebellion
  module: plugins.rebellion.rebellion_plugin.DefaultRebellionPlugin
  enabled: true
  metadata:
    version: 1.0.0
    description: 叛军系统：实力/资源/策略与传播
    author: AgentWorld Team
    dependencies:
    - towns
- name: residents
  module: plugins.resident.resident_plugin.DefaultResidentsPlugin
  enabled: true
  metadata:
    version: 1.0.0
    description: 居民系统：属性/满意度/社交互动与信息池
    author: AgentWorld Team
    dependencies:
    - map
  init_params:
    window_size: 3

settings:
  hot_reload: false
  verbose_loading: true
  load_timeout: 30
  allow_experimental: false
