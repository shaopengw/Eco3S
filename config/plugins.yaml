# ========================================
# 插件配置文件
# ========================================
# 
# 此文件定义系统中可用的插件列表
# 支持启用/禁用插件，提供元数据信息
#

plugins:
  # ========================================
  # 核心插件
  # ========================================
  
  - name: default_map
    module: plugins.map.map_plugin.DefaultMapPlugin
    enabled: true
    metadata:
      version: "1.0.0"
      description: "默认地图插件（包装 Map 类）"
      author: "AgentWorld Team"
      dependencies: []
    init_params:
      width: 100
      height: 100
      data_file: "config/default/towns_data.json"
  
  - name: default_time
    module: plugins.time.time_plugin.DefaultTimePlugin
    enabled: true
    metadata:
      version: "1.0.0"
      description: "默认时间管理系统"
      author: "AgentWorld Team"
      dependencies: []
  
  - name: default_population
    module: plugins.population.population_plugin.DefaultPopulationPlugin
    enabled: true
    metadata:
      version: "1.0.0"
      description: "默认人口管理插件"
      author: "AgentWorld Team"
      dependencies: []
  
  - name: default_towns
    module: plugins.towns.towns_plugin.DefaultTownsPlugin
    enabled: true
    metadata:
      version: "1.0.0"
      description: "默认城镇管理插件"
      author: "AgentWorld Team"
      dependencies: ["default_map"]
  
  - name: default_social_network
    module: plugins.social_network.social_network_plugin.DefaultSocialNetworkPlugin
    enabled: true
    metadata:
      version: "1.0.0"
      description: "默认社交网络插件（包装 SocialNetwork 类）"
      author: "AgentWorld Team"
      dependencies: ["default_population"]
  
  - name: default_climate
    module: plugins.climate.climate_plugin.DefaultClimatePlugin
    enabled: true
    metadata:
      version: "1.0.0"
      description: "默认气候系统插件（包装 ClimateSystem 类）"
      author: "AgentWorld Team"
      dependencies: ["default_map", "default_time"]
    init_params:
      climate_data_path: "experiment_dataset/climate_data/climate.csv"
  
  - name: default_transport_economy
    module: plugins.transport_economy.transport_economy_plugin.DefaultTransportEconomyPlugin
    enabled: true
    metadata:
      version: "1.0.0"
      description: "默认运输经济插件"
      author: "AgentWorld Team"
      dependencies: ["default_map"]
  
  - name: default_job_market
    module: plugins.job_market.job_market_plugin.DefaultJobMarketPlugin
    enabled: true
    metadata:
      version: "1.0.0"
      description: "默认就业市场插件"
      author: "AgentWorld Team"
      dependencies: []

# ========================================
# 插件路径配置
# ========================================
plugin_paths:
  # 额外的插件扫描路径
  - "plugins/"
  - "plugins/custom/"
  - "plugins/community/"
  - "plugins/experimental/"

# ========================================
# 全局插件设置
# ========================================
settings:
  # 是否启用插件热重载
  hot_reload: false
  
  # 是否显示插件加载详情
  verbose_loading: true
  
  # 插件加载超时（秒）
  load_timeout: 30
  
  # 是否允许加载实验性插件
  allow_experimental: false
