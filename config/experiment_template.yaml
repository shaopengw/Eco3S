# 实验配置模板

## 基础配置
simulation:
  name: "default_experiment"
  total_years: 10
  initial_population: 1000
  random_seed: 42

## 模块配置
modules:
  # 居民系统配置
  resident:
    enabled: true
    order: 1
    parameters:
      basic_living_cost: 1000
      initial_satisfaction: 0.7
      health_index_range: [0.3, 1.0]
      lifespan_range: [60, 90]
      
  # 政府系统配置
  government:
    enabled: true
    order: 2
    parameters:
      initial_budget: 1000000
      initial_military_strength: 100
      tax_rate_range: [0.1, 0.3]
      policy_impact_factor: 1.0

  # 叛军系统配置
  rebels:
    enabled: true
    order: 3
    parameters:
      initial_strength: 50
      initial_resources: 10000
      recruitment_rate: 0.01
      action_threshold: 0.7

  # 环境系统配置
  environment:
    enabled: true
    order: 0
    parameters:
      climate:
        enabled: true
        change_rate: 0.1
        impact_factor: 1.0
      
      towns:
        count: 5
        types: ["沿河", "非沿河"]
        distribution: {"沿河": 0.4, "非沿河": 0.6}
      
      job_market:
        job_types: ["农民", "工人", "商人", "官员"]
        base_salary:
          农民: 2000
          工人: 3000
          商人: 4000
          官员: 5000
        
      transport_economy:
        base_cost: 100
        distance_factor: 0.1

  # 社交网络配置
  social_network:
    enabled: true
    order: 4
    parameters:
      network_density: 0.3
      connection_radius: 2
      information_spread_rate: 0.5
      group_threshold: 0.6

## 数据收集配置
data_collection:
  metrics:
    - population
    - gdp
    - average_satisfaction
    - employment_rate
    - stability_index
  frequency: "monthly"
  format: "csv"

## 分析配置
analysis:
  enabled: true
  methods:
    - "time_series"
    - "network_analysis"
    - "event_correlation"
  visualization:
    - type: "line_plot"
      metrics: ["population", "gdp", "average_satisfaction"]
    - type: "heat_map"
      metrics: ["social_network_density"]
    - type: "event_timeline"
      metrics: ["government_actions", "rebel_activities"]
  export:
    format: "json"
    path: "experiment_results/"