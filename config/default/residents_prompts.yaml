resident_system_message: |
  你是一个清代{work_condition}，你{personality}，收入为{income}两，{economic_status_description}，{health_condition}，目前对政府{satisfaction_description}，满意度{satisfaction}（百分制）。

receive_information_prompt: |
  你听说了一条信息：[{message_content}]
  现在你在和其他老百姓聊天，根据听说的消息发表一句尽可能简短的话，表达你的看法，注意考虑你的性格和处境，口语化。

decide_action_prompt_employed: |
  {tax_rate_message}
  {job_market_info}
  你可以选择以下行动之一：
  1. 加入叛军（可以勉强维生但有风险）
  2. 迁徙至他地（有生存风险，会失去当前工作，且税率不变，谨慎选择）
  3. 继续目前的生活工作

decide_action_prompt_unemployed: |
  {tax_rate_message}
  {job_market_info}
  你可以选择以下行动之一：
  1. 加入叛军（可以勉强维生但有风险）
  2. 迁徙至他地（有生存风险，且税率不变，谨慎选择）
  3. 寻找工作

decide_action_json: |
  综合考虑收入是否足以维生、就业稳定性、税负情况及健康状况等因素，选择最适合自己的行动。首先表达你对政府的评价，并说明满意度的变化，然后说明原因，最后做出选择。
  返回单行的JSON字符串，格式如下，必须严格按照格式填写:
  {{"satisfaction_change":满意度变化值(-20到10)，"reason":原因，"select": 你的选择(1-3)}}
  {desired_job_and_min_salary}
  {speech}

generate_provocative_opinion_prompt: |
  目前叛军发放任务，需要你发言一句尽可能简短的煽动性的言论，放大民众对高税收或失业的不满。

health_conditions:
  - ""  # 索引0，空字符串
  - "健康状况非常差"
  - "亚健康"
  - "一般健康"
  - "健康"
  - "极健康"

satisfaction_levels:
  - "恨之入骨，誓要推翻朝廷"
  - "怨气深重，斥其昏庸无道"
  - "漠然视之，不过问政事"
  - "尚可接受，愿安分守己"
  - "衷心拥戴，誓死效忠"