asset_market:
  agent_types:
    fundamental_analyst: 0.3
    technical_trader: 0.3
    trend_follower: 0.4
  dividend_amount: 0.1
  information_noise:
    enabled: true
    noise_level: 0.1
  initial_asset_value: 1.5
  initial_assets_max: 10
  initial_assets_min: 0
  initial_cash: 100
  max_order_quantity: 50
  min_order_quantity: 1
  order_book_depth: 10
  price_tick_size: 0.01
  risk_preference:
    max: 0.9
    mean: 0.5
    min: 0.1
    std: 0.2
  trading_periods: 15
data:
  climate_info_path: experiment_dataset/climate_data/climate.csv
  government_info_path: experiment_dataset/government_data/official_data.json
  government_prompt_path: config/asset_market_bubble_sim/government_prompts.yaml
  jobs_config_path: config/asset_market_bubble_sim/jobs_config.yaml
  message_config_path: config/asset_market_bubble_sim/message_config.yaml
  questionnaire_path: config/asset_market_bubble_sim/questionnaire.yaml
  rebellion_info_path: experiment_dataset/rebellion_data/rebels_data.json
  rebels_prompt_path: config/asset_market_bubble_sim/rebels_prompts.yaml
  resident_actions_path: config/asset_market_bubble_sim/resident_actions.yaml
  resident_info_path: experiment_dataset/resident_data/resident_data.json
  resident_prompt_path: config/asset_market_bubble_sim/residents_prompts.yaml
  towns_data_path: config/asset_market_bubble_sim/towns_data.json
data_collection:
  enabled: true
  frequency: yearly
  metrics:
  - asset_price
  - trading_volume
  - bid_ask_spread
  - order_book_depth
  - asset_distribution
  - cash_distribution
  - agent_beliefs
  - wealth_distribution
  - price_volatility
  - market_liquidity
  - trade_frequency
  - population
  output_format: csv
  visualization:
    charts:
    - price_series
    - volume_series
    - order_book
    - wealth_distribution
    enabled: true
    update_frequency: 1
experiment:
  cache_enabled: false
  debug_mode: true
  parallel_execution: false
  random_seed: 42
  verbose_logging: true
module_parameters:
  job_market:
    base_salary:
      交易者: 0
    job_types:
    - 交易者
    unemployment_rate: 0
  map:
    height: 100
    location_sigma: 2
    max_connection_distance: 20
    navigability: 1
    width: 100
  resident:
    basic_living_cost: 0
    health_index_range:
    - 0.8
    - 1
    initial_satisfaction: 0.5
    lifespan_range:
    - 1000
    - 1000
  social_network:
    information_spread_rate: 0.5
    max_connections: 10
    network_density: 0.3
  towns:
    count: 1
    initial_resources: 0
    types:
    - 交易所
output:
  checkpoint_frequency: 5
  export_formats:
  - csv
  - json
  - png
  results_directory: results/asset_market_bubble_sim
  save_checkpoints: true
simulation:
  birth_rate: 0.05
  group_decision:
    government:
      enabled: 1
      max_rounds: 2
    rebellion:
      enabled: 0
      max_rounds: 0
  initial_population: 10
  map_height: 100
  map_width: 100
  max_retry_attempts: 3
  message_type: S
  response_probability: 0.1
  resume_from_cache: 0
  retry_delay: 1
  seed_count: 1
  simulation_name: asset_market_bubble_sim
  start_year: 1
  total_years: 3
