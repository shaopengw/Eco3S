# simulation_config.yaml - 资产市场泡沫模拟核心配置

# 数据路径
data:
  climate_info_path: "experiment_dataset/climate_data/climate.csv"
  government_info_path: "experiment_dataset/government_data/official_data.json"
  government_prompt_path: "config/asset_market_bubble_sim/government_prompts.yaml"
  jobs_config_path: "config/asset_market_bubble_sim/jobs_config.yaml"
  message_config_path: "config/asset_market_bubble_sim/message_config.yaml"
  questionnaire_path: "config/asset_market_bubble_sim/questionnaire.yaml"
  rebellion_info_path: "experiment_dataset/rebellion_data/rebels_data.json"
  rebels_prompt_path: "config/asset_market_bubble_sim/rebels_prompts.yaml"
  resident_info_path: "experiment_dataset/resident_data/resident_data.json"
  resident_prompt_path: "config/asset_market_bubble_sim/residents_prompts.yaml"
  resident_actions_path: "config/asset_market_bubble_sim/resident_actions.yaml"
  towns_data_path: "config/asset_market_bubble_sim/towns_data.json"

# 模拟参数
simulation:
  # 基础时间配置
  start_year: 1  # 模拟开始时间点（交易期1）
  total_years: 30
  
  # 人口配置
  initial_population: 200
  birth_rate: 0.05
  
  # 地图设置
  map_width: 100
  map_height: 100
  
  # 群体决策配置
  group_decision:
    government:
      enabled: 1  # 启用政府监管
      max_rounds: 2
    rebellion:
      enabled: 0  # 禁用叛乱模块
      max_rounds: 0
  
  # 行为参数
  response_probability: 0.1  # 智能体响应概率
  max_retry_attempts: 3  # 最大重试次数
  retry_delay: 1  # 重试延迟（秒）
  
  # 可选参数
  resume_from_cache: 0
  simulation_name: "asset_market_bubble_sim"
  message_type: "S"  # 信息传播类型
  seed_count: 1

# 资产市场特定参数
asset_market:
  # 资产基础设置
  trading_periods: 15  # 完整模拟：15个交易期
  dividend_amount: 0.1  # 每期固定分红（单位：元）
  initial_asset_value: 1.5  # 资产基础价值（15期×0.1元）
  
  # 智能体初始配置
  initial_cash: 100  # 每个智能体初始现金（单位：元）
  initial_assets_min: 0  # 最小初始资产数量
  initial_assets_max: 10  # 最大初始资产数量
  
  # 交易机制
  order_book_depth: 10  # 订单簿深度
  price_tick_size: 0.01  # 最小价格变动单位
  min_order_quantity: 1  # 最小交易数量
  max_order_quantity: 50  # 最大交易数量
  
  # 智能体类型分布（百分比）
  agent_types:
    fundamental_analyst: 0.3  # 基本面分析者（30%）
    technical_trader: 0.3  # 技术分析者（30%）
    trend_follower: 0.4  # 跟风者（40%）
  
  # 风险偏好分布
  risk_preference:
    min: 0.1  # 最低风险偏好（保守）
    max: 0.9  # 最高风险偏好（激进）
    mean: 0.5  # 平均风险偏好
    std: 0.2  # 标准差
  
  # 信息噪声
  information_noise:
    enabled: true
    noise_level: 0.1  # 信息噪声水平（0-1）

# 模块参数配置
module_parameters:
  # 居民系统
  resident:
    basic_living_cost: 0  # 无生活成本
    initial_satisfaction: 0.5
    health_index_range: [0.8, 1.0]  # 健康不影响交易
    lifespan_range: [1000, 1000]  # 禁用死亡机制
  
  # 职业市场（简化）
  job_market:
    job_types: ["交易者"]
    base_salary:
      交易者: 0  # 收入仅来自交易
    unemployment_rate: 0.0  # 所有智能体都是交易者
  
  # 社交网络
  social_network:
    network_density: 0.3  # 网络密度
    information_spread_rate: 0.5  # 信息传播速率
    max_connections: 10  # 最大连接数
  
  # 城镇系统
  towns:
    count: 1  # 单一交易市场
    types: ["交易所"]
    initial_resources: 0
  
  # 地图系统
  map:
    width: 100
    height: 100
    max_connection_distance: 20
    location_sigma: 2.0
    navigability: 1.0  # 完全可达

# 数据收集配置
data_collection:
  enabled: true
  metrics:
    # 核心市场指标
    - asset_price  # 资产价格
    - trading_volume  # 交易量
    - bid_ask_spread  # 买卖价差
    - order_book_depth  # 订单簿深度
    
    # 智能体指标
    - asset_distribution  # 资产分布
    - cash_distribution  # 现金分布
    - agent_beliefs  # 智能体信念
    - wealth_distribution  # 财富分布
    
    # 市场微观结构
    - price_volatility  # 价格波动率
    - market_liquidity  # 市场流动性
    - trade_frequency  # 交易频率
    
    # 基础指标
    - population  # 智能体数量
    
  frequency: "yearly"  # 每个交易期记录一次
  output_format: "csv"
  
  # 实时可视化
  visualization:
    enabled: true
    update_frequency: 1  # 每个交易期更新
    charts:
      - price_series  # 价格时间序列
      - volume_series  # 交易量时间序列
      - order_book  # 订单簿可视化
      - wealth_distribution  # 财富分布直方图

# 实验控制
experiment:
  # 随机种子
  random_seed: 42
  
  # 调试模式
  debug_mode: true
  verbose_logging: true
  
  # 性能优化
  parallel_execution: false  # 小规模测试不启用并行
  cache_enabled: false

# 输出配置
output:
  results_directory: "results/asset_market_bubble_sim"
  save_checkpoints: true
  checkpoint_frequency: 5  # 每5个交易期保存检查点
  export_formats: ["csv", "json", "png"]