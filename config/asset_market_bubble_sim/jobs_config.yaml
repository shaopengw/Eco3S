# 职业配置文件 (jobs_config.yaml)
# 实验名称: asset_market_bubble_sim
# 实验目标: 观察资产市场泡沫的形成与崩溃
#
# 说明：本实验场景下，职业主要用于区分智能体的交易风格和信息处理方式
# 所有智能体都是市场参与者，但具有不同的交易策略和角色定位
#
# ⚠️ 重要提示：
# - 本实验只有1个城镇，类型统一使用"非沿河"
# - 职业名称代表不同的交易者类型和市场角色
# - 基础薪资用于初始化智能体的现金储备
# ----------------------------------------------------------------------------------------------------

# 职业信息 (jobs_info)
# 定义了资产市场中不同类型交易者的基础现金配置
jobs_info:
  # 基本面分析师 - 基于资产基础价值进行交易决策
  基本面分析师:
    base_salary: 150  # 较高初始现金，倾向理性分析
  
  # 技术分析师 - 基于价格走势和技术指标进行交易
  技术分析师:
    base_salary: 120  # 中等初始现金，关注趋势和图表
  
  # 跟风交易者 - 模仿他人行为，追逐市场热点
  跟风交易者:
    base_salary: 100  # 标准初始现金，容易受市场情绪影响
  
  # 噪声交易者 - 基于不完全信息和直觉进行交易
  噪声交易者:
    base_salary: 80   # 较低初始现金，交易决策随机性较高
  
  # 做市商 - 提供流动性，维持市场秩序
  做市商:
    base_salary: 200  # 最高初始现金，需要维持双边报价


# 职业比例 (professions_ratio)
# 定义了不同交易者类型在市场中的分布比例
# 
# ⚠️ 说明：
# - 只使用"非沿河"类型（实验只有1个城镇）
# - 比例设计旨在模拟真实市场的参与者结构
# - 确保各类型总和在合理范围内
professions_ratio:
  # 基本面分析师：理性投资者，占比较小
  基本面分析师:
    非沿河: [0.10, 0.15]  # 10%-15%的理性投资者
  
  # 技术分析师：技术派交易者，占比中等
  技术分析师:
    非沿河: [0.20, 0.25]  # 20%-25%的技术分析者
  
  # 跟风交易者：容易受情绪影响，占比较大
  跟风交易者:
    非沿河: [0.30, 0.40]  # 30%-40%的跟风者（泡沫形成的重要因素）
  
  # 噪声交易者：随机决策者，占比中等
  噪声交易者:
    非沿河: [0.15, 0.25]  # 15%-25%的噪声交易者
  
  # 做市商：专业交易者，占比最小
  做市商:
    非沿河: [0.05, 0.10]  # 5%-10%的做市商（提供流动性）


# 使用说明:
# ----------------------------------------------------------------------------------------------------
# 1. 职业类型代表不同的交易策略和风险偏好：
#    - 基本面分析师：关注资产内在价值（0.1元/期分红 × 剩余期数）
#    - 技术分析师：关注价格趋势、成交量等技术指标
#    - 跟风交易者：观察他人行为，追涨杀跌（泡沫放大器）
#    - 噪声交易者：基于不完全信息，增加市场噪声
#    - 做市商：双边报价，提供流动性，平抑波动
#
# 2. 基础薪资(base_salary)对应初始现金配置：
#    - 与 module_parameters.resident 中的 initial_cash 参数配合使用
#    - 不同职业的现金差异可模拟市场参与者的资金实力差异
#
# 3. 职业比例设计考虑：
#    - 跟风交易者占比最高（30%-40%）：模拟真实市场的羊群效应
#    - 基本面分析师占比较低（10%-15%）：理性力量有限
#    - 做市商占比最小（5%-10%）：专业机构数量有限
#    - 总比例范围：约 80%-115%（允许一定重叠，系统会标准化）
#
# 4. 与实验目标的关联：
#    - 大量跟风交易者 → 容易形成泡沫
#    - 少量理性分析师 → 理性力量不足以阻止泡沫
#    - 噪声交易者 → 增加价格波动性
#    - 做市商 → 提供必要的流动性但无法控制泡沫
#
# 5. 配置调整建议：
#    - 若希望泡沫更明显：增加跟风交易者比例，减少基本面分析师
#    - 若希望市场更理性：增加基本面分析师比例
#    - 若希望波动更大：增加噪声交易者和技术分析师比例