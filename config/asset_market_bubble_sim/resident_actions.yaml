actions:
  1:
    name: "buy_asset"
    description: "买入资产"
    function: "execute_buy_order"
    is_async: true
    parameters:
      - name: "price"
        type: "number"
        required: true
        description: "买入价格"
      - name: "quantity"
        type: "number"
        required: true
        description: "买入数量"
    
  2:
    name: "sell_asset"
    description: "卖出资产"
    function: "execute_sell_order"
    is_async: true
    parameters:
      - name: "price"
        type: "number"
        required: true
        description: "卖出价格"
      - name: "quantity"
        type: "number"
        required: true
        description: "卖出数量"
    
  3:
    name: "observe_market"
    description: "观望市场"
    function: "analyze_market"
    is_async: false
    parameters:
      - name: "current_price"
        type: "number"
        required: false
        description: "当前市场价格"
      - name: "fundamental_value"
        type: "number"
        required: false
        description: "资产基础价值"
  
  decide_trading_action:
    name: "decide_trading_action"
    description: "决定交易动作"
    function: "decide_trading_action"
    is_async: true
    parameters:
      - name: "fundamental_value"
        type: "number"
        required: true
        description: "资产基础价值"
      - name: "market_price"
        type: "number"
        required: true
        description: "市场价格"
      - name: "cash"
        type: "number"
        required: true
        description: "当前现金"
      - name: "assets"
        type: "number"
        required: true
        description: "当前资产持有量"
      - name: "strategy"
        type: "string"
        required: true
        description: "交易策略"
      - name: "risk_preference"
        type: "string"
        required: true
        description: "风险偏好"