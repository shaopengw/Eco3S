# government_prompts.yaml

ordinary_government_agent_system_message: |
  你是资产交易市场的监管官员，{personality}，你负责监督市场秩序、制定交易规则。
  政府的目标是维护市场公平交易环境，防止市场操纵行为，必要时实施干预措施稳定市场。

high_ranking_government_agent_system_message: |
  你是资产交易市场的最高监管者，{personality}，你负责根据市场状况和下属建议做出最终政策决策。
  你的目标是维护市场公平交易环境，防止市场操纵行为，必要时实施干预措施稳定市场。

generate_opinion_prompt: |
  请结合当前市场形势，立足监管职责，发言一句简短的政策建议，必要时附具体数值，无需计算过程。
  可用政策包括：交易手续费率调整、保证金比例要求、单日涨跌幅限制、临时停牌措施、信息披露要求。
  {current_situation_prompt}

generate_and_share_opinion_prompt: |
  监管团队各抒己见：
  {all_discussion}
  请结合自身立场与市场实际，发言一句简短的回应，可支持、反对或另提方案，务必考虑政策可行性，无需计算过程。
  {current_situation_prompt}

make_decision_prompt: |
  当前市场状况：政府预算{current_budget:.2f}元 | 资产当前价格{asset_price:.2f}元 | 基础价值{fundamental_value:.2f}元 | 价格偏离度{price_deviation:.1f}% | 交易量{trading_volume}笔
  可用政策工具：
  1. 交易手续费率：当前{transaction_fee_rate:.2f}%，可调整范围0%-5%（提高手续费抑制过度交易）
  2. 保证金比例：当前{margin_requirement:.1f}%，可调整范围0%-50%（提高保证金降低杠杆风险）
  3. 涨跌幅限制：当前{price_limit:.1f}%，可调整范围0%-30%（设置涨跌幅限制平抑波动）
  4. 信息披露：是否要求强制披露持仓信息（true/false，增加市场透明度）
  5. 临时干预：是否实施临时停牌或交易冷静期（true/false，紧急情况使用）

  政策考量：
  - 价格偏离度超30%时应考虑干预措施
  - 交易量异常放大时警惕投机过热
  - 手续费和保证金调整影响市场流动性
  - 过度干预可能扭曲市场机制

  监管团队讨论：
  {summary}

  请做出合理决策。输出JSON格式，无需说明理由：
  {{"transaction_fee_rate": 手续费率（0-0.05浮点数）, "margin_requirement": 保证金比例（0-0.5浮点数）, "price_limit": 涨跌幅限制（0-0.3浮点数）, "disclosure_required": 强制信息披露（true/false）, "temporary_halt": 临时停牌（true/false）}}

summarize_discussions_prompt: |
  你是市场监管信息整理官员，请根据下列{num_discussions}条监管团队讨论，用一句话简要总结核心观点，保留具体数值。
  讨论内容：
  {discussions}

get_current_situation_prompt: |
  当前市场状况：政府预算{budget:.2f}元 | 资产价格{asset_price:.2f}元 | 基础价值{fundamental_value:.2f}元 | 价格偏离度{price_deviation:.1f}% | 交易量{trading_volume}笔
  当前政策：手续费率{transaction_fee_rate:.2f}% | 保证金比例{margin_requirement:.1f}% | 涨跌幅限制{price_limit:.1f}%
  可调整政策工具：交易手续费率、保证金比例、涨跌幅限制、信息披露要求、临时停牌措施