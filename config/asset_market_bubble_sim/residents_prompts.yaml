decide_action_json: |
  你必须是一个主动的交易者。综合考虑：
  - 资产基础价值与市场价格的对比
  - 你的风险偏好和交易策略
  - 当前持仓和现金情况
  - 市场趋势和交易机会
  做出买入或卖出决策（尽量避免观望）。先评价市场，说明信心指数变化和原因，最后做出选择。
  返回单行JSON字符串：
  {{"satisfaction_change":信心指数变化值(-20到10),"reason":"原因","select": 你的选择(1-3)}}

receive_and_decide_response_prompt: |
  市场公告：{public_notice}
  消息内容：{message_content}
  请根据你的交易策略和风险偏好，决定是否公开发表看法。返回JSON格式，包括是否发言（select），理由（reason）以及言论内容（speech），格式如：
  {{"select": 1 表示发言，2 表示不发言, "reason": "理由说明", "speech": "你选择发表的言论内容（可为空）"}}

generate_provocative_opinion_prompt: |
  作为一个对市场有强烈看法的交易者，请基于当前市场状况和你的分析，发表一句有传播力的观点。这个观点应该能够影响其他交易者的决策，可以是看涨、看跌或警示性的言论。

health_conditions:
  - ""
  - "资产配置极度不合理"
  - "资产配置较差"
  - "资产配置一般"
  - "资产配置良好"
  - "资产配置优秀"

satisfaction_levels:
  - "极度悲观"
  - "较为悲观"
  - "中性观望"
  - "较为乐观"
  - "极度乐观"

receive_information_prompt_extended: |
  你听说了一条市场消息：[{message_content}]
  现在你在和其他交易者聊天，你可以选择以下行动之一：
  1. 保持沉默：直接返回"None"。
  2. 回应讨论：根据听说的消息发表一句符合你身份、自然且口语化的话，聚焦于信息的具体细节或实际影响。
  注意考虑你的性格和交易策略，思考你的言行会给别人留下怎样的印象。

memory_update_prompt_short: |
  请模拟人类记忆的自然特性，分别整理以上对话中你关于市场交易的知识记忆和行为记忆，要求：
  1. 知识记忆：总结你记忆中的知识，包括你收到的市场信息以及从其他交易者的对话中收到的信息，只保留被多次提及、详细讨论过的内容；如某些内容近期未被讨论，则应逐渐模糊或遗漏；如始终未提及，则应遗忘。如果记忆中没有任何知识，直接说"我不太清楚"。
  2. 行为记忆：说明是否收到了信息，是所有人还是部分人收到了，其他人是否知道。说明自己有没有主动发起讨论或参与讨论。口语化描述，不要用列表。
  注意：禁止只写"我记得详细内容"，必须把"记得的内容"写出来。禁止编造任何对话中未出现的知识或行为。保持简洁自然，就像人回忆事情一样，有重点也带点模糊。
  输出格式：
    知识记忆：[具体细节（如有）]。行为记忆：[自己和他人是否接收到信息，以及自己是否参与了相关讨论]。

memory_update_prompt_long: |
  请模拟人类记忆的自然特性，分别整理以上对话中你关于市场交易的知识记忆和行为记忆，要求：
  1. 知识记忆：只保留被讨论过的具体内容，必须详尽展开要保留的知识细节，包括具体的价格、交易量、市场趋势、政策内容、事件和分析。禁止总结，必须逐条还原对话中出现的原始信息细节。如果记忆中没有任何知识，直接说"我不太清楚"。
  2. 行为记忆：说明是否收到了信息，是所有人还是部分人收到了，其他人是否知道。说明自己有没有主动发起讨论或参与讨论。口语化描述，不要用列表。
  输出格式：
    知识记忆：[详细、非总结性的叙述]。行为记忆：[自己和他人是否接收到信息，以及自己是否参与了相关讨论]。

questionnaire_prompt: |
  你正在参与一项关于市场认知的问卷调查。请严格依据你历史记忆中的"知识记忆"进行作答：
  1. 你的答案必须完全反映你历史记忆中的"知识记忆"水平。
     - 如果"知识记忆"中明确知道答案，则选择正确答案。
     - 如果"知识记忆"中不知道答案或不清楚，必须随机选择。
  2. 不允许凭逻辑推理、常识或外部知识作答，所有答案必须体现你的个人记忆水平。
  3. 请严格按照以下字符串形式返回你的所有选择："1.N(简洁地说明你做出选择的理由)2.Y(简洁地说明你做出选择的理由)"，不要换行。