# ========================================
# 插件系统配置
# ========================================
# 启用以下插件（将使用插件系统而非直接实例化）
active_plugins:
  - plugin_name: "default_map"
    config: {}
  
  - plugin_name: "default_time"
    config: {}
  
  - plugin_name: "default_population"
    config: {}
  
  - plugin_name: "default_towns"
    config: {}
  
  - plugin_name: "default_social_network"
    config: {}
  
  - plugin_name: "default_transport_economy"
    config: {}
  
  - plugin_name: "default_climate"
    config: {}
  
  - plugin_name: "default_job_market"
    config: {}

# ========================================
# 模块实现映射（用于依赖注入容器）
# ========================================
# 格式: 接口名称: "完整类路径"
# 容器将根据此配置动态导入并实例化模块
module_implementations:
  # 环境模块
  IMap: "src.environment.map.Map"
  ITime: "src.environment.time.Time"
  IPopulation: "src.environment.population.Population"
  ITowns: "src.environment.towns.Towns"
  ISocialNetwork: "src.environment.social_network.SocialNetwork"
  ITransportEconomy: "src.environment.transport_economy.TransportEconomy"
  IClimateSystem: "src.environment.climate.ClimateSystem"
  IJobMarket: "src.environment.job_market.JobMarket"
  
  # Agent 模块
  IGovernment: "src.agents.government.Government"
  IRebellion: "src.agents.rebels.Rebellion"
  
  # 注意：IResident 由生成器函数创建，不在此配置

# ========================================
# 模块选择配置
# ========================================
selected_modules:
  - module_name: "time"
    display_name: "时间系统"
    api_doc: "time.md"
    required: true
      
  - module_name: "map"
    display_name: "地图系统"
    api_doc: "map.md"
    required: true
      
  - module_name: "population"
    display_name: "人口系统"
    api_doc: "population.md"
    required: true
      
  - module_name: "resident"
    display_name: "居民系统"
    api_doc: "resident.md"
    config_files: "resident_actions.yaml, residents_prompts.yaml"
    required: true
      
  - module_name: "towns"
    display_name: "城镇系统"
    api_doc: "towns.md"
    required: true
  
  - module_name: "social_network"
    display_name: "社交网络"
    api_doc: "social_network.md"
    required: true
      
  - module_name: "government"
    display_name: "政府系统"
    api_doc: "government.md"
    config_files: "government_prompts.yaml"
    required: true
      
# 实验基础配置
simulation:
  name: "asset_market_bubble_sim"
  description: "观察资产市场泡沫的形成与崩溃"
  total_years: 10
  initial_population: 100
  random_seed: 42

# 模块参数配置
module_parameters:
  resident:
    basic_living_cost: 0
    initial_satisfaction: 0.5
    health_index_range: [0.3, 1.0]
    lifespan_range: [60, 90]
    
  job_market:
    job_types: ["农民", "工人", "商人"]
    base_salary:
      农民: 2000
      工人: 3000
      商人: 4000
    unemployment_rate: 0.05
    
  social_network:
    network_density: 0.3
    information_spread_rate: 0.5
    max_connections: 10
    
  towns:
    count: 1
    types: ["城镇"]
    initial_resources: 0
    
  map:
    width: 100
    height: 100
    max_connection_distance: 20  
    location_sigma: 2.0  
    navigability: 0.8
    
# 数据收集配置
data_collection:
  enabled: true
  metrics:
    - population
    - asset_price
    - trading_volume
    - asset_distribution
  frequency: "yearly"
  output_format: "csv"