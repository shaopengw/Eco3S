data:
  climate_info_path: experiment_dataset/climate_data/climate.csv
  government_info_path: experiment_dataset/government_data/official_data.json
  government_prompt_path: config/government_prompts.yaml
  jobs_config_path: config/jobs_config.yaml
  rebellion_info_path: experiment_dataset/rebellion_data/rebels_data.json
  rebels_prompt_path: config/rebels_prompts.yaml
  resident_info_path: experiment_dataset/resident_data/resident_data.json
  resident_prompt_path: config/residents_prompts.yaml
  towns_data_path: config/towns_data.json
simulation:
  birth_rate: 0.05
  group_decision:
    government:
      enabled: 1
      max_rounds: 2
    rebellion:
      enabled: 0
      max_rounds: 2
  initial_population: 6
  map_height: 150
  map_width: 100
  max_retry_attempts: 3
  response_probability: 0.5
  resume_from_cache: 0
  retry_delay: 1
  simulation_name: ""
  start_year: 1650
  total_years: 2
