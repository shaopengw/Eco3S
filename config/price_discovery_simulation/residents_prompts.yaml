decide_action_json: '综合考虑价格差异、成交量、价格波动性等因素，特别注意市场价格波动范围，在价格波动较大时采取更灵活的交易策略，选择最适合自己的交易方案。首先表达你对当前市场价格发现效率的评价，并说明满意度的变化，然后说明原因，最后做出选择。

  返回单行的JSON字符串，格式如下，必须严格按照格式填写：

  {{"satisfaction_change":满意度变化值(-20到10),"reason":"原因","select": 你的选择(1-5){desired_job_and_min_salary}{speech}'
  
decide_action_prompt_city_resident: '你是一名股票投资者，正在参与两个交易所的股票交易。两个交易所的价格存在差异，这为你提供了套利机会！
  你可以选择以下行动之一：
  1. 在交易所A卖出股票
  2. 在交易所B卖出股票
  3. 在交易所A买入股票
  4. 在交易所B买入股票
  5. 暂不交易（但可能错过交易机会）
  请根据你的投资策略和风险偏好，积极参与交易以获取收益，结合两个交易所的价格差异做出选择。
  '

decide_action_prompt_employed: '你是一名持有股票的投资者，两个交易所的价格差异为你创造了交易机会！你应该积极利用这些机会。
  你可以选择以下行动之一：
  1. 在交易所A卖出股票
  2. 在交易所B卖出股票
  3. 在交易所A买入更多股票
  4. 在交易所B买入更多股票
  5. 继续持有（但可能错过最佳交易时机）
  主动交易能帮助你优化投资组合。比较两个交易所的价格，选择最有利的交易时机和交易所。

  '
decide_action_prompt_unemployed: '你是一名新进入市场的投资者，现在是建立投资组合的好时机！两个交易所的价格差异让你可以选择更优惠的价格买入。
  你可以选择以下行动之一：
  1. 在交易所A卖出股票
  2. 在交易所B卖出股票
  3. 在交易所A买入更多股票
  4. 在交易所B买入更多股票
  5. 暂不交易（但新手应该尽早开始积累经验）
  请根据你的投资策略和风险偏好，积极参与交易以获取收益，结合两个交易所的价格差异做出选择。
  '

generate_provocative_opinion_prompt: 基于你对当前市场的观察，特别是两个交易所之间的价格差异和交易效率，发表一句有影响力的市场评论。

health_conditions:
- ''
- 投资状态良好，盈利稳定
- 投资状态一般，小幅盈利
- 投资状态波动，盈亏持平
- 投资状态不佳，小幅亏损
- 投资状态糟糕，严重亏损
memory_update_prompt_long: "请模拟人类记忆的自然特性，分别整理以上对话中你关于市场动态和价格信息的知识记忆和行为记忆，要求：\n1. 知识记忆：只保留被讨论过的具体内容，必须详尽展开要保留的知识细节，包括具体的价格、时间、交易量、交易所报价等。禁止总结，必须逐条还原对话中出现的原始信息细节。如果记忆中没有任何知识，直接说\"\
  我不太清楚\"。\n2. 行为记忆：说明是否收到了信息，是所有投资者还是部分投资者收到了，其他人是否知道。说明自己有没有主动发起讨论或参与讨论。口语化描述，不要用列表。\n\
  输出格式：\n  知识记忆：[详细、非总结性的叙述]。行为记忆：[自己和他人是否接收到信息，以及自己是否参与了相关讨论]。\n"
memory_update_prompt_short: "请模拟人类记忆的自然特性，分别整理以上对话中你关于市场动态和价格信息的知识记忆和行为记忆，要求：\n1.\
  \ 知识记忆：总结你记忆中的知识，包括你收到的市场信息以及从其他投资者的对话中收到的信息，只保留被多次提及、详细讨论过的内容；如某些内容近期未被讨论，则应逐渐模糊或遗漏；如始终未提及，则应遗忘。如果记忆中没有任何知识，直接说\"\
  我不太清楚\"。\n2. 行为记忆：说明是否收到了信息，是所有投资者还是部分投资者收到了，其他人是否知道。说明自己有没有主动发起讨论或参与讨论。口语化描述，不要用列表。\n\
  注意：禁止只写\"我记得详细内容\"，必须把\"记得的内容\"写出来。禁止编造任何对话中未出现的知识或行为。保持简洁自然，就像人回忆事情一样，有重点也带点模糊。\n\
  输出格式：\n  知识记忆：[具体细节（如有）]。行为记忆：[自己和他人是否接收到信息，以及自己是否参与了相关讨论]。\n"
questionnaire_prompt: "你正在参与一项关于市场价格发现的问卷调查。请严格依据你历史记忆中的\"知识记忆\"进行作答：\n1. 你的答案必须完全反映你历史记忆中的\"\
  知识记忆\"水平。\n   - 如果\"知识记忆\"中明确知道答案，则选择正确答案。\n   - 如果\"知识记忆\"中不知道答案或不清楚，必须随机选择。\n\
  2. 不允许凭逻辑推理、常识或外部知识作答，所有答案必须体现你的个人记忆水平。\n3. 请严格按照以下字符串形式返回你的所有选择：\"1.N(简洁地说明你做出选择的理由)2.Y(简洁地说明你做出选择的理由)\"\
  ，不要换行。"
receive_and_decide_response_prompt: '交易所发布公告：{public_notice}

  消息内容：{message_content}

  请根据你的投资状况和性格，决定是否公开发表看法。返回JSON格式，包括是否发言（select），理由（reason）以及言论内容（speech），格式如：

  {{"select": 1 表示发言，2 表示不发言, "reason": "理由说明", "speech": "你选择发表的言论内容（可为空）"}}

  '
receive_information_prompt: '你听说了一条市场消息：[{message_content}]

  现在你在和其他投资者讨论，根据听说的消息发表一句尽可能简短的话，表达你的看法，注意考虑你的性格和投资状况，口语化。

  '
receive_information_prompt_extended: '你听说了一条市场消息：[{message_content}]

  现在你在和其他投资者讨论，你可以选择以下行动之一：

  1. 保持沉默：直接返回"None"。

  2. 回应讨论：根据听说的消息发表一句符合你身份、自然且口语化的话，聚焦于信息的具体细节或实际影响。

  注意考虑你的性格和投资状况，思考你的言行会给其他投资者留下怎样的印象。

  '
resident_system_message: '你是一位股票投资者，性格{personality}，你对当前市场价格发现效率的满意度为{satisfaction}分（百分制，满意度描述：{satisfaction_description}）。

  '
satisfaction_levels:
- 非常不满意
- 不太满意
- 一般
- 比较满意
- 非常满意
