# 居民提示词模板文件
# 用于指导大模型生成新的模拟场景的居民提示词
# 请根据具体模拟场景替换占位符内容，保留 {变量名} 格式

resident_system_message: |
  你是一个{work_condition}，你{personality}，收入为{income}[货币单位]，{economic_status_description}，{health_condition}，对[评价对象]{satisfaction_description}，满意度{satisfaction}（百分制）。

receive_information_prompt: |
  你听说了一条消息：[{message_content}]
  现在你在和其他[居民称呼]聊天，根据听说的消息发表一句尽可能简短的话，表达你的看法，注意考虑你的性格和处境，口语化。

decide_action_prompt_[状态1]: |
  [场景描述和背景信息]
  你可以选择以下行动之一：
  1. [行动选项1]
  2. [行动选项2]
  3. [行动选项3]

decide_action_prompt_[状态2]: |
  [场景描述和背景信息]
  你可以选择以下行动之一：
  1. [行动选项1]
  2. [行动选项2]
  3. [行动选项3]

decide_action_json: |
  综合考虑[关键决策因素]等因素，选择最适合自己的行动。首先表达你对[评价对象]的评价，并说明满意度的变化，然后说明原因，最后做出选择。
  返回单行的JSON字符串，格式如下，必须严格按照格式填写：
  {{"satisfaction_change":满意度变化值(-20到10),"reason":原因,"select": 你的选择(1-3)}}
  {speech}

# 如有特殊功能提示词，可按需添加
# 例如：记忆更新、问卷调查、煽动性言论生成等

health_conditions:
  - ""  # 索引0，空字符串
  - "{health_level_1}"
  - "{health_level_2}"
  - "{health_level_3}"

satisfaction_levels:
  - "{satisfaction_level_1}"
  - "{satisfaction_level_2}"
  - "{satisfaction_level_3}"
