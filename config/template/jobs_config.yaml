# 职业配置模板 (jobs_config.yaml)
#
# 本文件定义了模拟中不同职业的基本信息和在不同城镇类型中的分布比例。
# 它包括了职业的基础薪资以及在“沿河”和“非沿河”城镇中的人口比例范围。
#
# ----------------------------------------------------------------------------------------------------

# 职业信息 (jobs_info)
# 定义了模拟中存在的各种职业及其基础薪资。
# 注意：不同模拟场景可能包含不同的职业类型和薪资设定。
jobs_info:
  # 示例，最好延续以下名称:
  农民:
    base_salary: 10 
  商人:
    base_salary: 30 
  叛军:
    base_salary: 12
  官员及士兵:
    base_salary: 20
  运河维护工:
    base_salary: 15
  #。。。


# 职业比例 (professions_ratio)
# 定义了不同职业在不同城镇类型（沿河/非沿河）中的人口比例范围。
# 每个职业的比例都由一个 [最小值, 最大值] 的列表表示。
# 注意：不同模拟场景可能对职业比例有不同的设定。
professions_ratio:
  # 农民在不同城镇类型中的比例
  农民:
    沿河: [0.25, 0.35] # 沿河城镇中农民的比例范围
    非沿河: [0.7, 0.8] # 非沿河城镇中农民的比例范围
  # 商人在不同城镇类型中的比例
  商人:
    沿河: [0.05, 0.1]
    非沿河: [0.0, 0.05]
  # 。。。

# 使用说明:
# - 在配置新的模拟场景时，请根据实际需求调整 `jobs_info` 和 `professions_ratio`。
# - 确保 `jobs_info` 中定义的职业与 `professions_ratio` 中使用的职业名称一致。
# - 职业比例的范围应合理，且在同一城镇类型中所有职业的比例总和不应超过1。