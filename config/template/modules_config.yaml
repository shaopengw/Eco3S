## modules_config.yaml 写作格式模板
## 顶层仅允许键：selected_modules / new_modules
##
## selected_modules: Dict[module_name:str, plugin_name:str]
## - module_name: 非空字符串；建议小写+下划线；作为“模块标识/绑定名”。
## - plugin_name: 非空字符串；必须是现有插件名称。
##
## new_modules: List[Dict]
## - name: 新模块/插件名（建议小写+下划线）。
## - inherits_from: 若可继承则填“现有插件名”，否则填 null。
## - notes: 需要扩展/覆盖的关键点（尽量简短）。
##
## 说明：运行时插件加载目前只会使用 selected_modules；new_modules 用于设计阶段记录“需要新增插件”的信息。
selected_modules:
  # 核心插件（必有）：SimArchitect 只能“增加”，禁止删除/覆盖这些条目
  time: time
  map: map
  population: population
  towns: towns
  social_network: social_network
  residents: residents

# 默认不新增插件
new_modules: []

