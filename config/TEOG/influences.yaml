# TEOG 项目影响函数配置

# 影响函数执行顺序（模块名 + target_name）
# - InfluenceManager 会按此顺序触发：simulator_state[module].apply_influences(target, context)
execution_order:
  - module: map
    target: canal_decay
  - module: transport_economy
    target: river_price
  - module: transport_economy
    target: maintenance_cost
  - module: population
    target: birth_rate
  - module: government
    target: government_budget

  #Residents: 年度状态更新（自动随 source 变化生效）
  - module: residents
    target: income
  - module: residents
    target: health_index
  - module: residents
    target: lifespan
  - module: residents
    target: death

influences:
  #Map: 气候影响 -> 运河通航能力衰减
  - name: climate_impact_to_navigability
    type: expr
    source:
      module: climate
      inputs:
        current_navigability:
          path: context.current_navigability
          fallback_paths:
            - target.navigability
          default: 0.8
          coerce: float
        climate_impact_factor:
          path: context.climate_impact_factor
          default: 0.0
          coerce: float
        natural_decay_rate:
          value: 0.1
    target: canal_decay
    description: 运河通航能力按默认公式自然衰减，并受气候影响
    params:
      expr: max(0, current_navigability * (1 - natural_decay_rate) - climate_impact_factor * 0.6)
      target_attr: navigability
      context_updates:
        navigability: $result

  #TransportEconomy: 通航能力 -> 河运价格
  - name: navigability_to_river_price
    type: expr
    source:
      module: map
      inputs:
        navigability:
          path: context.navigability
          default: 0.8
          coerce: float
        transport_cost:
          path: context.transport_cost
          fallback_paths:
            - target.transport_cost
          default: 0.0
          coerce: float
    target: river_price
    description: river_price = max(round(transport_cost * (2 - navigability),2), transport_cost)
    params:
      expr: max(round(transport_cost * (2 - navigability), 2), transport_cost)
      target_attr: river_price

  #TransportEconomy: 通航能力 -> 运河维护成本
  - name: navigability_to_maintenance_cost
    type: expr
    source:
      module: map
      inputs:
        navigability:
          path: context.navigability
          default: 0.8
          coerce: float
        exponent:
          path: context.exponent
          default: 3
          coerce: float
        maintenance_cost_base:
          path: context.maintenance_cost_base
          fallback_paths:
            - target.maintenance_cost_base
          default: 0.0
          coerce: float
    target: maintenance_cost
    description: maintenance_cost = base * ((2 - navigability) ** exponent)
    params:
      expr: maintenance_cost_base * ((2 - navigability) ** exponent)
      result_key: maintenance_cost

  #Government: GDP+税率 -> 预算（税收收入）
  - name: gdp_tax_rate_to_budget
    type: expr
    source:
      module: economy
      inputs:
        gdp:
          path: context.gdp
          default: 0.0
          coerce: float
        tax_rate:
          path: context.tax_rate
          fallback_paths:
            - target.tax_rate
          default: 0.0
          coerce: float
        old_budget:
          path: target.budget
          default: 0.0
          coerce: float
    target: government_budget
    description: 政府预算每年增加税收收入（tax_income = gdp * tax_rate）
    params:
      expr: round(old_budget + gdp * tax_rate, 2)
      target_attr: budget
      context_updates:
        tax_income: gdp * tax_rate

  #Population: 满意度 -> 出生率
  - name: satisfaction_to_birth_rate
    type: expr
    source:
      module: satisfaction
      inputs:
        satisfaction:
          path: context.satisfaction
          default: 0
          coerce: float
        base_rate:
          path: context.current_birth_rate
          fallback_paths:
            - target.birth_rate
          default: 0.01
          coerce: float
    target: birth_rate
    description: 满意度影响出生率（与 Population.update_birth_rate 的默认分段逻辑完全一致）
    params:
      expr: min(0.5, base_rate + (satisfaction - 80) * 0.002) if satisfaction >= 80 else (max(0.01, base_rate - (50 - satisfaction) * 0.001) if satisfaction <= 50 else base_rate)
      target_attr: birth_rate

      #Resident: 天气/通航能力 -> 收入
  - name: climate_and_navigability_to_income
    type: code
    source: climate
    target: income
    description: 天气影响农民收入，通航能力影响城市居民收入
    params:
      code: |
        job = getattr(target, 'job', None)
        if job is None:
          result = None
        else:
          # 农民收入受天气影响；城市居民受通航能力影响
          try:
            climate_impact = float(context.get('climate_impact_factor', 0.0) or 0.0)
          except Exception:
            climate_impact = 0.0
          # 优先使用 time-step 开始时的 current_navigability（与历史硬编码一致：衰减前通航能力）
          river_navigability = context.get('current_navigability', None)
          if river_navigability is None:
            river_navigability = context.get('navigability', None)
          if river_navigability is None:
            m = context.get('map')
            if m is not None and hasattr(m, 'get_navigability'):
              river_navigability = m.get_navigability()
          try:
            river_navigability = float(river_navigability or 0.0)
          except Exception:
            river_navigability = 0.0

          town_name = getattr(target, 'town', None)
          job_market = getattr(target, 'job_market', None)

          # 兼容：若 resident 未绑定 job_market，则从 towns 里回查
          if job_market is None:
            towns = context.get('towns')
            towns_dict = getattr(towns, 'towns', None) if towns is not None else None
            if isinstance(towns_dict, dict) and town_name in towns_dict:
              town_data = towns_dict.get(town_name) or {}
              if isinstance(town_data, dict):
                job_market = town_data.get('job_market')

          jobs_info = getattr(job_market, 'jobs_info', None)
          if not isinstance(jobs_info, dict) or job not in jobs_info:
            result = None
          else:
            base_salary = (jobs_info.get(job) or {}).get('base_salary', 0) or 0
            try:
              base_salary = float(base_salary)
            except Exception:
              base_salary = 0.0

            if job == '农民':
              new_income = round(base_salary * (1 - climate_impact), 2)
            elif job == '城市居民':
              new_income = round(base_salary * river_navigability, 2)
            else:
              new_income = getattr(target, 'income', 0) or 0

            target.income = max(0, new_income)
            result = target.income

  #Resident: 职业 -> 健康指数
  - name: job_to_health_index
    type: code
    source: resident
    target: health_index
    description: 职业 -> 健康：叛军额外健康下降
    params:
      code: |
        health = getattr(target, 'health_index', 0) or 0
        job = getattr(target, 'job', None)
        if job == '叛军':
            target.health_index = max(0, health - 2)

  #Resident: 收入 -> 健康指数
  - name: income_to_health_index
    type: code
    source: resident
    target: health_index
    description: 收入（个体）+ 基本生活成本（全局） -> 健康
    params:
      code: |
        health = getattr(target, 'health_index', 0) or 0
        job = getattr(target, 'job', None)
        income = getattr(target, 'income', 0) or 0
        basic_living_cost = context.get('basic_living_cost', 0) or 0

        new = health
        if income <= 0:
            new = max(0, new - 2)
        elif income < basic_living_cost:
            new = max(0, new - 1)
        elif income >= basic_living_cost * 2:
            if job == '叛军':
                new = min(10, new + 0.5)
            else:
                new = min(10, new + 1)

        target.health_index = new

  #Resident: 满意度 -> 健康指数
  - name: satisfaction_to_health_index
    type: code
    source: resident
    target: health_index
    description: 满意度（个体） -> 健康
    params:
      code: |
        health = getattr(target, 'health_index', 0) or 0
        job = getattr(target, 'job', None)
        satisfaction = getattr(target, 'satisfaction', 0) or 0

        new = health
        if satisfaction < 30:
            new = max(0, new - 1)
        elif satisfaction > 80:
            if job == '叛军':
                new = min(10, new + 0.5)
            else:
                new = min(10, new + 1)

        target.health_index = new

  #Resident: 健康指数 -> 健康指数（收敛/类型）
  - name: health_index_to_health_index_clamped
    type: expr
    source:
      module: resident
      inputs:
        health:
          path: target.health_index
          default: 0.0
          coerce: float
    target: health_index
    description: 健康指数收敛到 [0,10] 且转为 int
    params:
      expr: int(max(0, min(10, health)))
      target_attr: health_index

  #Resident: 健康指数 -> 寿命递减（每时间步）
  - name: health_index_to_lifespan
    type: expr
    source:
      module: time
      inputs:
        health_index:
          path: target.health_index
          default: 0
          coerce: int
        lifespan:
          path: target.lifespan
          default: 0
          coerce: int
    target: lifespan
    description: 每个时间步根据健康衰减寿命（health<=1：-5，否则 -1）
    params:
      expr: lifespan - (5 if health_index <= 1 else 1)
      target_attr: lifespan

  #Resident: 寿命 -> 死亡清理
  - name: lifespan_to_death
    type: code
    source: resident
    target: death
    description: 若寿命<=0：调用 handle_death 并从 residents dict 移除，同时同步 population.death()
    params:
      code: |
        lifespan = int(getattr(target, 'lifespan', 0) or 0)
        if lifespan > 0:
            result = False
        else:
            if hasattr(target, 'handle_death'):
                target.handle_death()

            residents_dict = context.get('residents')
            rid = getattr(target, 'resident_id', None)
            try:
                if residents_dict is not None and rid in residents_dict:
                    del residents_dict[rid]
            except Exception:
                pass

            pop = context.get('population')
            if pop is not None and hasattr(pop, 'death'):
                pop.death()

            res = context.get('result')
            if hasattr(res, 'get') and hasattr(res, '__setitem__'):
                res['resident_deaths'] = int(res.get('resident_deaths', 0) or 0) + 1

            result = True
