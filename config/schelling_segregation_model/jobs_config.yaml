# 职业配置文件 (jobs_config.yaml)
# 谢林隔离模型 - 职业与就业市场配置
#
# 本文件定义了模拟中不同职业的基本信息和在不同城镇类型中的分布比例。
# 
# ⚠️ 重要提示：城镇类型必须与 towns_data.json 保持一致！
# - 系统默认将 towns_data.json 中 type='c**###**' 的城镇判定为"沿河"
# - 其他所有城镇（包括 other_towns 中未指定 type 的）判定为"非沿河"
# - professions_ratio 中的城镇类型键名必须使用"沿河"或"非沿河"
# - 本实验不涉及运河系统，统一使用"非沿河"类型
#
# 模型说明：谢林隔离模型主要研究空间隔离的涌现机制，职业系统作为辅助
# 经济要素，保持简化设计以突出居民迁移和聚居行为。
# ----------------------------------------------------------------------------------------------------

# 职业信息 (jobs_info)
# 定义了模拟中存在的各种职业及其基础薪资。
# 谢林模型中职业主要影响居民收入和满意度，进而影响迁移决策。
jobs_info:
  # 农业相关职业 - 基础生产者
  农民:
    base_salary: 15
    # 说明：基础生产职业，收入稳定但较低
  
  # 商业相关职业 - 中等收入群体
  商人:
    base_salary: 35
    # 说明：商业活动参与者，收入较高
  
  # 服务业职业 - 普通服务提供者
  服务员:
    base_salary: 18
    # 说明：提供基础服务，收入中等偏下
  
  # 手工业职业 - 技术工人
  工匠:
    base_salary: 25
    # 说明：具备技术技能，收入中等
  
  # 政府相关职业 - 公共服务
  官员及士兵:
    base_salary: 30
    # 说明：政府雇员和维护秩序人员
  
  # 特殊职业 - 冲突相关
  叛军:
    base_salary: 20
    # 说明：参与叛乱活动，收入不稳定
  
  # 无业人员
  无业:
    base_salary: 0
    # 说明：失业或待业状态


# 职业比例 (professions_ratio)
# 定义了不同职业在城镇中的人口比例范围。
# 每个职业的比例都由一个 [最小值, 最大值] 的列表表示。
#
# ⚠️ 城镇类型说明：
# - 本实验不涉及运河系统，所有城镇统一为"非沿河"类型
# - 比例范围设计考虑了谢林模型中居民的经济差异性
# - 确保不同职业的收入差异能够影响居民的迁移决策
#
# 注意：所有职业比例总和应接近但不超过1.0（考虑到初始失业率）
professions_ratio:
  # 农民 - 占比最大的基础职业
  农民:
    非沿河: [0.35, 0.45]
    # 说明：农业人口占主体，反映传统经济结构
  
  # 商人 - 较小比例的高收入群体
  商人:
    非沿河: [0.08, 0.12]
    # 说明：商业精英阶层，数量较少但影响力大
  
  # 服务员 - 中等规模的服务业人群
  服务员:
    非沿河: [0.15, 0.20]
    # 说明：提供日常服务，是城镇运转的重要组成
  
  # 工匠 - 技术工人群体
  工匠:
    非沿河: [0.10, 0.15]
    # 说明：具备专业技能，收入中等偏上
  
  # 官员及士兵 - 政府相关人员
  官员及士兵:
    非沿河: [0.05, 0.08]
    # 说明：政府职能人员，维护社会秩序
  
  # 叛军 - 潜在冲突因素
  叛军:
    非沿河: [0.00, 0.03]
    # 说明：初始叛军比例较低，可能随社会不稳定增加
  
  # 无业 - 初始失业人口
  无业:
    非沿河: [0.05, 0.10]
    # 说明：初始失业率，反映就业市场的不完全性


# 使用说明与设计理念:
# ----------------------------------------------------------------------------------------------------
# 1. 职业设置符合谢林模型的简化原则：
#    - 职业主要作为经济分层的标识，影响居民收入和满意度
#    - 收入差异会影响居民对居住环境的要求和迁移能力
#    - 不同职业的居民可能形成不同的聚居模式
#
# 2. 收入梯度设计（从低到高）：
#    无业(0) < 农民(15) < 服务员(18) < 叛军(20) < 工匠(25) < 官员(30) < 商人(35)
#    这种收入差异会导致不同经济阶层的空间分布差异
#
# 3. 比例设计考虑因素：
#    - 农民占比最大，反映传统农业社会结构
#    - 商人等高收入群体占比较小，符合经济金字塔结构
#    - 保留5-10%的初始失业率，增加系统动态性
#    - 各职业比例总和约为0.88-1.00，留有弹性空间
#
# 4. 与谢林模型核心机制的关联：
#    - 职业 → 收入 → 生活成本支付能力 → 满意度 → 迁移决策
#    - 不同职业居民的聚居倾向可能不同（通过满意度阈值体现）
#    - 经济因素与空间邻居相似度共同影响迁移行为
#
# 5. 配置灵活性：
#    - 可通过调整 base_salary 改变经济分层程度
#    - 可通过调整 professions_ratio 改变社会结构
#    - 支持实验中动态增减职业岗位（通过 JobMarket API）
#
# 6. 与其他模块的协调：
#    - 确保 base_salary 与基本生活成本相匹配（基本生活成本需在经济环境中设定）
#    - 失业率会影响叛军招募和社会稳定性
#    - 职业分布影响城镇经济产出和 GDP 计算