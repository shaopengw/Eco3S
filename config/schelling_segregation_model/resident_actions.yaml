actions:
  1:
    name: "work"
    description: "寻找工作或继续工作"
    function: "handle_work"
    is_async: false
    parameters:
      - name: "desired_job"
        type: "string"
        required: false
        description: "期望的工作类型"
      - name: "min_salary"
        type: "number"
        required: false
        description: "可接受的最低薪资"
    
  2:
    name: "migrate"
    description: "搬迁到其他网格"
    function: "migrate_to_new_town"
    is_async: true
    parameters:
      - name: "map"
        type: "object"
        required: true
        default: null
        description: "地图对象，用于确定搬迁目标网格"
      - name: "update_job"
        type: "boolean"
        required: false
        default: false
        description: "是否更新职业，谢林模型中搬迁通常保留原职业"
    
  3:
    name: "join_rebellion"
    description: "加入叛乱组织"
    function: "job_market.assign_specific_job_withoutcheck"
    is_async: false
    parameters:
      - name: "job_type"
        type: "string"
        required: true
        default: "叛军"
        description: "要分配的工作类型，默认为叛军"

  4:
    name: "join_country"
    description: "加入城邦成为城市居民"
    function: "job_market.assign_specific_job_withoutcheck"
    is_async: false
    parameters:
      - name: "job_type"
        type: "string"
        required: true
        default: "城市居民"
        description: "要分配的工作类型，默认为城市居民"

  5:
    name: "self_sufficiency"
    description: "自给自足（转为农民）"
    function: "job_market.assign_specific_job_withoutcheck"
    is_async: false
    parameters:
      - name: "job_type"
        type: "string"
        required: true
        default: "农民"
        description: "要分配的工作类型，默认为农民"