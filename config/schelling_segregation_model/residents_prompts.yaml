decide_action_json: '综合考虑周围邻居的构成比例、经济状况、社会环境等因素,选择最适合自己的行动。注意:人们通常倾向于维持现状并保持社区凝聚力,除非有充分理由改变。首先表达你对当前居住环境的评价,说明周围同类邻居比例是否达到你的预期阈值,然后权衡留下与搬迁的利弊(包括对社区稳定性的影响),最后做出审慎的选择。


  返回单行的JSON字符串,格式如下,必须严格按照格式填写:


  {{"satisfaction_change":满意度变化值(-20到10),"reason":"原因(需明确说明邻居比例是否低于阈值、搬迁必要性及对社区稳定性的考虑)","select":
  你的选择(1-3){desired_job_and_min_salary}{speech}}}'
decide_action_prompt_city_resident: '{tax_rate_message}


  {job_market_info}


  {weather_condition}


  作为城市居民,你观察周围邻居的构成情况。搬迁意味着离开熟悉的社区、打断已建立的社交网络,你会优先考虑留在当前位置并保持社区凝聚力。只有当周围同类居民比例明显低于你的预期阈值,且持续让你感到不适应时,你才会考虑搬迁。请充分考虑社区稳定性对自身和整体环境的重要性。


  你可以选择以下行动之一:


  1. 继续留在当前网格(默认选项,除非有充分理由搬迁)


  2. 搬迁到其他网格(仅当同类邻居比例持续低于阈值)


  3. 加入其他社会组织'
decide_action_prompt_employed: '{tax_rate_message}


  {job_market_info}


  {weather_condition}


  你观察周围的邻居,发现其中同类居民的比例情况。作为一个已就业的居民,你倾向于留在熟悉的环境中并保持社区凝聚力,除非周围邻居构成严重不符合你的预期。搬迁会带来新环境适应成本和不确定性,同时也会影响社区的稳定性。


  你可以选择以下行动之一:


  1. 继续在当前位置工作和生活(优先考虑此选项)


  2. 搬迁到其他网格(仅当同类邻居比例明显低于你的阈值时)


  3. 加入叛乱组织'
decide_action_prompt_unemployed: '{tax_rate_message}


  {job_market_info}


  {weather_condition}


  你观察周围的邻居,发现其中同类居民的比例情况。作为一个无业居民,虽然面临就业压力,但你对当前居住地有一定的依恋和惯性,并且重视社区凝聚力和稳定性。轻易搬迁需要付出额外成本,也会削弱社区联系。


  你可以选择以下行动之一:


  1. 寻找工作机会(优先考虑)


  2. 搬迁到其他网格(仅当邻居构成严重不符合预期,且搬迁能带来明显改善时)


  3. 自给自足(农民生活)'
generate_provocative_opinion_prompt: '作为一个对当前居住环境不满的居民，你决定煽动其他居民采取行动。请根据你的处境和对邻居构成的不满，发表一句简短有力的煽动性言论，表达你希望改变现状的愿望。

  '
health_conditions:
- ''
- 身体极度虚弱，生命垂危
- 身体虚弱，经常生病
- 健康状况一般
- 身体健康，精力充沛
- 身体强壮，活力旺盛
memory_update_prompt_long: "请模拟人类记忆的自然特性，分别整理以上对话中你关于邻居构成和居住环境的知识记忆和行为记忆，要求：\n1. 知识记忆：只保留被讨论过的具体内容，必须详尽展开要保留的知识细节，包括具体的年份、数字、政策内容、人物和事件。禁止总结，必须逐条还原对话中出现的原始信息细节。如果记忆中没有任何知识，直接说\"\
  我不太清楚\"。\n2. 行为记忆：说明是否收到了信息，是所有人还是部分人收到了，其他人是否知道。说明自己有没有主动发起讨论或参与讨论。口语化描述，不要用列表。\n\
  输出格式：\n  知识记忆：[详细、非总结性的叙述]。行为记忆：[自己和他人是否接收到信息，以及自己是否参与了相关讨论]。\n"
memory_update_prompt_short: "请模拟人类记忆的自然特性，分别整理以上对话中你关于邻居构成和居住环境的知识记忆和行为记忆，要求：\n1.\
  \ 知识记忆：总结你记忆中的知识，包括你收到的信息以及从其他居民的对话中收到的信息，只保留被多次提及、详细讨论过的内容；如某些内容近期未被讨论，则应逐渐模糊或遗漏；如始终未提及，则应遗忘。如果记忆中没有任何知识，直接说\"\
  我不太清楚\"。\n2. 行为记忆：说明是否收到了信息，是所有人还是部分人收到了，其他人是否知道。说明自己有没有主动发起讨论或参与讨论。口语化描述，不要用列表。\n\
  注意：禁止只写\"我记得详细内容\"，必须把\"记得的内容\"写出来。禁止编造任何对话中未出现的知识或行为。保持简洁自然，就像人回忆事情一样，有重点也带点模糊。\n\
  输出格式：\n  知识记忆：[具体细节（如有）]。行为记忆：[自己和他人是否接收到信息，以及自己是否参与了相关讨论]。\n"
questionnaire_prompt: "你正在参与一项关于居住环境偏好的问卷调查。请严格依据你历史记忆中的\"知识记忆\"进行作答：\n1. 你的答案必须完全反映你历史记忆中的\"\
  知识记忆\"水平。\n   - 如果\"知识记忆\"中明确知道答案，则选择正确答案。\n   - 如果\"知识记忆\"中不知道答案或不清楚，必须随机选择。\n\
  2. 不允许凭逻辑推理、常识或外部知识作答，所有答案必须体现你的个人记忆水平。\n3. 请严格按照以下字符串形式返回你的所有选择：\"1.N(简洁地说明你做出选择的理由)2.Y(简洁地说明你做出选择的理由)\"\
  ，不要换行。"
receive_and_decide_response_prompt: '政府发布公告：{public_notice}

  消息内容：{message_content}

  请根据你的生活状况和性格，决定是否公开发表看法。返回JSON格式，包括是否发言（select），理由（reason）以及言论内容（speech），格式如：

  {{"select": 1 表示发言，2 表示不发言, "reason": "理由说明", "speech": "你选择发表的言论内容（可为空）"}}

  '
receive_information_prompt: '你听说了一条消息：[{message_content}]

  现在你在和其他居民聊天，根据听说的消息发表一句尽可能简短的话，表达你的看法，注意考虑你的性格和处境，口语化。

  '
receive_information_prompt_extended: '你听说了一条消息：[{message_content}]

  现在你在和其他居民聊天，你可以选择以下行动之一：

  1. 保持沉默：直接返回"None"。

  2. 回应讨论：根据听说的消息发表一句符合你身份、自然且口语化的话，聚焦于信息的具体细节或实际影响。

  注意考虑你的性格和处境，思考你的言行会给别人留下怎样的印象。

  '
resident_system_message: '你是一个{work_condition}，你{personality}，收入为{income}单位，{economic_status_description}，{health_condition}，对当前居住环境{satisfaction_description}，满意度{satisfaction}（百分制）。

  '
satisfaction_levels:
- 极度不满
- 比较不满
- 一般
- 比较满意
- 非常满意
