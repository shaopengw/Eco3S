# message_config.yaml
# 谢林隔离模型 - 信息传播配置
# 用于政府和叛军的宣传信息内容

# 政府宣传信息（短版）- 用于日常广播
government_propaganda_short: |
  1. 【社区和谐】政府倡导多元共存，鼓励不同族群和谐相处，共建包容社区
  2. 【居住权益】所有居民享有平等的居住选择权，任何形式的歧视都将受到法律制裁
  3. 【社区建设】政府投资改善公共设施，提升所有社区的生活品质
  4. 【稳定发展】保持现有居住状态有利于社会稳定和经济发展
  5. 【就业机会】多元化社区提供更多就业和商业机会

# 政府宣传信息（长版）- 用于重要政策宣讲
government_propaganda_long: |
  1. 【多元共融政策】政府致力于建设包容性社区，鼓励不同族群间的交流与合作，反对任何形式的隔离倾向
  2. 【居住平等权利】所有居民不论族群背景，都享有在任何区域自由居住的权利，政府将严厉打击歧视行为
  3. 【社区发展计划】政府将在混合族群社区投入更多资源，改善教育、医疗、交通等公共服务设施
  4. 【经济繁荣保障】多元化社区能够促进商业活力，创造更多就业机会，提高整体经济水平
  5. 【社会稳定基石】族群融合是社会稳定的基础，频繁迁移会破坏社区结构，影响生活质量
  6. 【教育文化交流】混合社区为子女提供更丰富的文化体验和教育资源，有利于培养开放心态
  7. 【税收优惠政策】居住在混合社区的居民可享受一定的税收减免和生活补贴
  8. 【长期价值投资】稳定的居住环境有助于房产保值增值，频繁搬迁会增加生活成本

# 叛军宣传信息（短版）- 用于日常煽动
rebellion_propaganda_short: |
  1. 【族群认同】与同族群居民聚居能够保护我们的文化传统和生活方式
  2. 【安全保障】同族聚居区域更加安全可靠，邻里之间互帮互助
  3. 【政府欺骗】政府的"融合政策"是虚伪的，只会稀释我们的影响力
  4. 【自由选择】我们有权选择与谁为邻，这是基本的自由权利
  5. 【行动号召】如果你周围的同族邻居太少，应该立即搬迁到我们的聚居区

# 叛军宣传信息（长版）- 用于深度动员
rebellion_propaganda_long: |
  1. 【文化保护使命】只有在同族群聚居的环境中，我们才能真正保护和传承自己的语言、习俗和价值观
  2. 【安全感需求】与同族群居民为邻能够提供心理安全感，减少文化冲突和误解带来的压力
  3. 【经济互助网络】同族聚居形成的经济互助网络更加可靠，在困难时期能够获得更多支持
  4. 【政策质疑】政府推动的所谓"融合"政策实质上是强制同化，剥夺了我们的文化自主权
  5. 【教育优先】在同族聚居区，子女能够接受符合我们价值观的教育，不会被异族文化侵蚀
  6. 【政治影响力】聚居能够增强我们在地方政治中的话语权和影响力，更好地维护群体利益
  7. 【居住阈值警告】当你周围8个邻居中同族比例低于50%时，就应该考虑搬迁以保持文化认同
  8. 【成功案例】许多同族居民通过搬迁到聚居区获得了更好的生活质量和归属感
  9. 【行动指南】如果感到不满意，不要犹豫，立即在空置房屋中寻找更适合的居住地点
  10. 【团结力量】只有团结在一起，我们才能对抗政府的同化政策，维护族群尊严

# 中立信息 - 用于客观描述现状
neutral_information: |
  1. 【居住现状】当前城市呈现多样化的居住格局，既有混合社区也有相对集中的族群聚居区
  2. 【迁移数据】统计显示部分居民会根据邻居构成选择迁移，这是个人自由选择的结果
  3. 【社区变化】城市各区域的族群构成处于动态变化中，空置房屋为居民提供了迁移选项
  4. 【满意度调查】不同居民对邻居族群构成的偏好存在差异，满意度受多种因素影响

# 社交网络传播的谣言/信息
social_rumors: |
  1. 听说某某区域的房子空了很多，可能是不少人搬走了
  2. 我的邻居说他考虑搬家，因为周围的同族邻居太少了
  3. 有人说政府要在混合社区提供补贴，但也有人说这是陷阱
  4. 据说聚居区的居民生活更幸福，不知道是真是假
  5. 我朋友搬到了同族聚居区后，说感觉安心多了
  6. 有传言说某个区域正在形成新的聚居区，很多人在往那边搬

# 紧急通知模板
emergency_notice: |
  【紧急通知】{event_description}
  影响范围：{affected_area}
  应对措施：{response_action}
  请所有居民保持冷静，遵守秩序。

# 政策公告模板
policy_announcement: |
  【政策公告】{policy_name}
  实施日期：{effective_date}
  主要内容：{policy_content}
  适用对象：{target_group}
  详情请咨询当地政府部门。