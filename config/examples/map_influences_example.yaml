# 地图模块影响函数配置示例
# 
# 本配置文件展示如何使用影响函数系统替代地图模块中的硬编码更新公式
# 主要包括：运河维护更新和运河自然衰减

influences:
  # ==================== 运河维护影响（替代 update_river_condition 硬编码公式）====================
  
  # 1. 维护投入充足时的影响（maintenance_ratio >= 1）
  # 原公式：new_navigability = current_navigability + 0.1 * maintenance_ratio
  - type: code
    source: government
    target: canal
    name: maintenance_boost
    description: 政府维护投入充足时提升运河通航能力
    params:
      code: |
        # 获取当前通航能力和维护比例
        current = context.get('current_navigability', 0.8)
        maintenance = context.get('maintenance_ratio', 1.0)
        
        # 只在维护充足时生效
        if maintenance >= 1:
            # 每增加一倍通航能力额外增加 0.1
            result = current + 0.1 * maintenance
            # 限制在 [0, 1] 范围内
            result = max(0, min(1.0, result))
        else:
            result = None  # 不满足条件，不产生影响
      target_attr: _navigability
      result_var: result
  
  # 2. 维护投入不足时的影响（maintenance_ratio < 1）
  - type: code
    source: government
    target: canal
    name: maintenance_decay
    description: 政府维护投入不足时降低运河通航能力
    params:
      code: |
        current = context.get('current_navigability', 0.8)
        maintenance = context.get('maintenance_ratio', 1.0)
        
        # 只在维护不足时生效
        if maintenance < 1:
            # 每减少一倍通航能力减少 0.2
            result = current - 0.2 * maintenance
            # 限制在 [0, 1] 范围内
            result = max(0, min(1.0, result))
        else:
            result = None
      target_attr: _navigability
      result_var: result
  
  # ==================== 运河自然衰减影响（替代 decay_river_condition_naturally 硬编码公式）====================
  
  # 3. 自然衰减（10%基础衰减率）
  # 原公式：navigability * (1 - 0.1) - climate_impact_factor * 0.6
  - type: code
    source: time
    target: canal_decay
    name: natural_decay
    description: 运河的自然衰减（每年10%）
    params:
      code: |
        current = context.get('current_navigability', 0.8)
        climate_impact = context.get('climate_impact_factor', 0)
        
        # 基础衰减率 10%
        natural_decay_rate = 0.1
        
        # 应用衰减和气候影响
        result = current * (1 - natural_decay_rate) - climate_impact * 0.6
        
        # 限制在 [0, 1] 范围内
        result = max(0, min(1.0, result))
      target_attr: _navigability
      result_var: result
  
  # ==================== 更灵活的运河维护影响（可选，替代方案）====================
  
  # 4. 线性维护影响（简化版本）
  # 使用 LinearInfluence 类型实现类似效果
  - type: linear
    source: government
    target: canal_linear
    name: maintenance_linear_effect
    description: 维护投入的线性影响（示例）
    params:
      variable: maintenance_ratio
      coefficient: 0.1      # 维护比例每增加1，通航能力增加0.1
      constant: 0.0
      target_attr: _navigability
      mode: add             # 累加模式
  
  # 5. 气候对运河的阈值影响
  # 当气候影响因子超过阈值时触发严重损害
  - type: threshold
    source: climate
    target: canal_decay
    name: extreme_climate_damage
    description: 极端气候对运河造成严重损害
    params:
      threshold: 0.7
      compare_op: gt
      impact_value: -0.3    # 通航能力减少30%
      source_key: climate_impact_factor
  
  # 6. 季节性运河维护加成
  # 在适宜季节维护效果更好
  - type: conditional
    source: time
    target: canal
    name: seasonal_maintenance_bonus
    description: 春秋季节维护效果更好
    params:
      conditions:
        time.season: [spring, autumn]   # 春季或秋季
      impact_value: 0.05   # 额外5%的通航能力提升

# ==================== 使用说明 ====================
#
# 在模拟器初始化时加载此配置：
#
# from src.influences import InfluenceRegistry
# from src.environment.map import Map
# import yaml
#
# # 加载影响函数配置
# with open('config/map_influences_example.yaml', 'r', encoding='utf-8') as f:
#     config = yaml.safe_load(f)
#
# # 创建注册中心并加载配置
# influence_registry = InfluenceRegistry()
# influence_registry.load_from_config(config)
#
# # 创建地图并传入注册中心
# map_module = Map(
#     width=100,
#     height=150,
#     data_file='config/default/towns_data.json',
#     influence_registry=influence_registry
# )
#
# # 使用影响函数更新运河状态
# map_module.update_river_condition(maintenance_ratio=1.2)
# map_module.decay_river_condition_naturally(climate_impact_factor=0.3)
#
# ==================== 配置调整建议 ====================
#
# 1. 调整维护效果：
#    修改 maintenance_boost 中的 0.1 系数来改变维护提升幅度
#
# 2. 调整衰减速率：
#    修改 natural_decay 中的 0.1 (natural_decay_rate) 来改变衰减速度
#
# 3. 调整气候影响：
#    修改 natural_decay 中的 0.6 系数来改变气候的影响强度
#
# 4. 添加新的影响类型：
#    可以添加更多影响函数，如：
#    - 人口密度对运河磨损的影响
#    - 贸易量对运河维护需求的影响
#    - 技术进步对运河效率的影响
#
# 5. 使用不同的影响类型：
#    - constant: 固定值影响
#    - linear: 线性关系
#    - code: 自定义复杂逻辑
#    - threshold: 阈值触发
#    - conditional: 条件判断
