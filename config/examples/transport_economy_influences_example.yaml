# TransportEconomy 模块影响函数配置
# 用于替代原有的硬编码运输成本计算公式

influences:
  # ==================== 河运价格计算 ====================
  
  # 1. 基础河运价格（基于通航能力）
  - name: base_river_price
    type: code
    source: navigability
    target: river_price
    params:
      target_attr: _river_price
      code: |
        # 通航能力越低，价格越高
        transport_economy = context['transport_economy']
        navigability = context['navigability']
        transport_cost = context['transport_cost']
        
        # 计算价格：transport_cost * (2 - navigability)
        river_price = round(transport_cost * (2 - navigability), 2)
        
        # 确保不低于基础价格
        transport_economy._river_price = max(river_price, transport_cost)
  
  # 2. 极端天气加价（可选）
  - name: extreme_weather_surcharge
    type: code
    source: weather
    target: river_price
    params:
      target_attr: _river_price
      code: |
        # 极端天气条件下额外加价
        transport_economy = context['transport_economy']
        navigability = context['navigability']
        
        # 如果通航能力很低（< 0.3），额外加价20%
        if navigability < 0.3:
            transport_economy._river_price *= 1.2
  
  # 3. 季节性价格调整（可选）
  - name: seasonal_price_adjustment
    type: conditional
    source: time
    target: river_price
    params:
      conditions:
        - condition: "context.get('season') == 'winter'"
          action:
            type: linear
            mode: multiply
            coefficient: 1.1
            constant: 0
            variable: _river_price
            target_attr: _river_price
        - condition: "context.get('season') == 'summer'"
          action:
            type: linear
            mode: multiply
            coefficient: 0.95
            constant: 0
            variable: _river_price
            target_attr: _river_price

  # ==================== 维护成本计算 ====================
  
  # 4. 基础维护成本（指数增长）
  - name: base_maintenance_cost
    type: code
    source: navigability
    target: maintenance_cost
    params:
      code: |
        # 通航能力越低，维护成本指数增长
        navigability = context['navigability']
        exponent = context.get('exponent', 3)
        maintenance_cost_base = context['maintenance_cost_base']
        
        # 计算维护成本：base * ((2 - navigability) ^ exponent)
        cost = maintenance_cost_base * ((2 - navigability) ** exponent)
        context['result']['maintenance_cost'] = round(cost, 2)
  
  # 5. 紧急维护附加费（可选）
  - name: emergency_maintenance_fee
    type: threshold
    source: navigability
    target: maintenance_cost
    params:
      threshold: 0.2
      comparison: less_than
      effect:
        type: linear
        mode: add
        coefficient: 0
        constant: 500  # 紧急维护固定附加费
        variable: maintenance_cost
        target_attr: maintenance_cost
        use_result_dict: true

  # 6. 维护成本折扣（高通航能力奖励）
  - name: good_condition_discount
    type: threshold
    source: navigability
    target: maintenance_cost
    params:
      threshold: 0.9
      comparison: greater_than
      effect:
        type: linear
        mode: multiply
        coefficient: 0.8  # 20% 折扣
        constant: 0
        variable: maintenance_cost
        target_attr: maintenance_cost
        use_result_dict: true

  # ==================== 总运输成本计算 ====================
  
  # 7. 基础总成本（河运+海运）
  - name: base_total_cost
    type: code
    source: transport_mix
    target: total_transport_cost
    params:
      code: |
        # 计算河运和海运的混合成本
        river_ratio = context['river_ratio']
        river_price = context['river_price']
        sea_price = context['sea_price']
        transport_task = context['transport_task']
        
        # 河运成本 + 海运成本
        river_cost = river_price * river_ratio * transport_task
        sea_cost = sea_price * (1 - river_ratio) * transport_task
        
        context['result']['total_cost'] = river_cost + sea_cost
  
  # 8. 大货量折扣（可选）
  - name: bulk_discount
    type: code
    source: transport_volume
    target: total_transport_cost
    params:
      code: |
        # 运输量大时享受折扣
        transport_task = context['transport_task']
        
        if transport_task > 10000:  # 超过1万吨
            # 给予5%折扣
            context['result']['total_cost'] *= 0.95
        elif transport_task > 5000:  # 超过5千吨
            # 给予2%折扣
            context['result']['total_cost'] *= 0.98
  
  # 9. 运河优先政策激励（可选）
  - name: canal_priority_incentive
    type: threshold
    source: government_policy
    target: total_transport_cost
    params:
      threshold: 0.7
      comparison: greater_than
      effect:
        type: linear
        mode: multiply
        coefficient: 0.9  # 河运比例超过70%时，总成本减10%
        constant: 0
        variable: total_cost
        target_attr: total_cost
        use_result_dict: true

# ==================== 使用说明 ====================
# 
# 1. 基础配置（必需）：
#    - base_river_price: 计算河运价格
#    - base_maintenance_cost: 计算维护成本
#    - base_total_cost: 计算总运输成本
#
# 2. 可选增强：
