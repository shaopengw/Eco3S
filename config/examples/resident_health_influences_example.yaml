# Resident 模块健康指数影响函数配置示例
# 将 update_health_index 方法中的硬编码规则提取为可配置的影响函数

influences:
  # ==================== 职业影响 ====================
  
  # 1. 叛军职业健康惩罚
  # 叛军生活艰苦，健康快速下降 -2
  - name: rebel_job_health_penalty
    type: code
    source: job
    target: health_index
    params:
      code: |
        resident = context['resident']
        job = context.get('job', '')
        
        if job == "叛军":
            # 叛军职业每个时间步 -2 健康
            context['result']['health_change'] += -2
  
  # ==================== 收入影响 ====================
  
  # 2. 无收入健康惩罚
  # 无收入严重影响健康 -2
  - name: no_income_health_penalty
    type: threshold
    source: income
    target: health_index
    params:
      threshold: 0
      comparison: less_than_or_equal
      effect:
        type: constant
        value: -2
        target_attr: health_change
        use_result_dict: true
        mode: add
  
  # 3. 低收入健康惩罚
  # 收入不足基本生活成本，影响健康 -1
  - name: low_income_health_penalty
    type: code
    source: income
    target: health_index
    params:
      code: |
        income = context.get('income', 0)
        basic_living_cost = context.get('basic_living_cost', 0)
        
        # 只有在有收入但不足基本生活成本时才触发
        if 0 < income < basic_living_cost:
            context['result']['health_change'] += -1
  
  # 4. 高收入健康恢复
  # 收入 >= 2倍基本生活成本，健康恢复
  # 叛军 +0.5，其他职业 +1
  - name: high_income_health_recovery
    type: code
    source: income
    target: health_index
    params:
      code: |
        income = context.get('income', 0)
        basic_living_cost = context.get('basic_living_cost', 0)
        job = context.get('job', '')
        
        if income >= basic_living_cost * 2:
            if job == "叛军":
                # 叛军恢复较少
                context['result']['health_change'] += 0.5
            else:
                # 其他职业正常恢复
                context['result']['health_change'] += 1
  
  # ==================== 满意度影响 ====================
  
  # 5. 低满意度健康惩罚
  # 满意度 < 30，影响健康 -1
  - name: low_satisfaction_health_penalty
    type: threshold
    source: satisfaction
    target: health_index
    params:
      threshold: 30
      comparison: less_than
      effect:
        type: constant
        value: -1
        target_attr: health_change
        use_result_dict: true
        mode: add
  
  # 6. 高满意度健康恢复
  # 满意度 > 80，健康恢复
  # 叛军 +0.5，其他职业 +1
  - name: high_satisfaction_health_recovery
    type: code
    source: satisfaction
    target: health_index
    params:
      code: |
        satisfaction = context.get('satisfaction', 0)
        job = context.get('job', '')
        
        if satisfaction > 80:
            if job == "叛军":
                # 叛军恢复较少
                context['result']['health_change'] += 0.5
            else:
                # 其他职业正常恢复
                context['result']['health_change'] += 1


