#    government = Government(
#        map=map_obj,
#        towns=towns,
#        military_strength=100,
#        initial_budget=10000,
#        time=time_obj,
#        transport_economy=transport_econ,
#        government_prompt_path='config/default/government_prompts.yaml',
#        influence_registry=registry
#    )
#    
#    # 调整税率（将自动应用影响函数）
#    government.adjust_tax_rate(0.15)  # 尝试增加15%税率
#    ```
#
# 6. 高级场景组合示例：
#
#    ```yaml
#    # 战争 + 财政危机场景
#    - 启用 wartime_tax_limit (战争税率上限70%)
#    - 启用 fiscal_crisis_emergency_tax (财政危机允许60%)
#    - 结果：战争时期财政危机可以提高到60%
#    
#    # 民主 + 低满意度场景
#    - 启用 democratic_tax_limit (民主制度约束)
#    - 启用 progressive_tax_by_satisfaction (满意度累进税)
#    - 结果：低满意度下税率被严格限制在15-25%
#    ```
