models:
  OPENAI:
    model_types:
      - gpt-3.5-turbo
    model_platform: OPENAI
    url_env: OPENAI_API_BASE_URL
    api_key_env: OPENAI_API_KEY
    allow_random: true
    rate_limit_key: openai

  CLAUDE:
    model_types:
      - claude-sonnet-4-5-20250929
    model_platform: OPENAI_COMPATIBLE_MODEL
    url_env: ANTHROPIC_API_BASE_URL
    api_key_env: ANTHROPIC_API_KEY
    allow_random: false
    rate_limit_key: claude

