rate_limits:
  default:
    max_concurrency: 0
    rpm_limit: 0
    window_seconds: 60

  openai:
    max_concurrency: 8
    rpm_limit: 0
    window_seconds: 60

  claude:
    max_concurrency: 8
    rpm_limit: 0
    window_seconds: 60

  dashscope:
    max_concurrency: 8
    rpm_limit: 480
    window_seconds: 60

  ollama:
    max_concurrency: 2
    rpm_limit: 0
    window_seconds: 60
