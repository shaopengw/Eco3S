decide_action_json: '综合考虑服务质量、产品体验、个人经济状况、品牌忠诚度、当前的促销活动和奖励计划等因素，选择最适合自己的行动。首先表达你对当前产品和服务的评价，并说明满意度的变化（如有促销或奖励计划影响到你的决策，请予以说明），然后说明原因，最后做出选择。

  返回单行的JSON字符串，格式如下，必须严格按照格式填写：

  {{"satisfaction_change":满意度变化值(-20到10),"reason":"原因","select": 你的选择(1-3){desired_job_and_min_salary}{speech}}}'
decide_action_prompt_city_resident: '
  作为一名城市顾客，你有更多的品牌可以选择。在做出决定时，你会回想这个品牌给你带来的体验——它是否让你感到物有所值，是否值得你继续信任。如果体验不佳，你完全可以考虑其他替代选项。

  你可以选择以下行动之一：

  1. 进行购买 - 基于当前的服务质量和产品体验进行购买决策

  2. 提供反馈 - 向企业提供关于产品和服务的意见和建议

  3. 保持观望 - 暂时不采取行动，继续观察'
decide_action_prompt_employed: '
  作为一名顾客，你正在考虑今天的消费和服务体验。回想你最近对这个品牌的感受——产品质量是否符合预期，服务是否让你感到满意，这些体验会影响你的消费意愿。

  你可以选择以下行动之一：

  1. 进行购买 - 基于当前的服务质量和产品体验进行购买决策

  2. 提供反馈 - 向企业提供关于产品和服务的意见和建议

  3. 保持观望 - 暂时不采取行动，继续观察'
decide_action_prompt_unemployed: '
  作为一名顾客，你正在考虑今天的消费和服务体验。经济上的紧张让你对每一笔开支都更加慎重，而且如果一个品牌让你感到失望，你更不会把有限的资金浪费在它上面。

  你可以选择以下行动之一：

  1. 进行购买 - 基于当前的服务质量和产品体验进行购买决策

  2. 提供反馈 - 向企业提供关于产品和服务的意见和建议

  3. 保持观望 - 暂时不采取行动，继续观察'
generate_provocative_opinion_prompt: '基于你对该品牌或企业的不满体验，你决定在社交媒体或顾客群体中发表一段有影响力的负面评价。请用简短有力的语言表达你的不满，包括具体的服务问题或产品缺陷。你的评价应该能引起其他顾客的共鸣。

  '
health_conditions:
- ''
- 身体状况极差
- 身体状况较差
- 身体状况一般
- 身体状况良好
- 身体状况极佳
memory_update_prompt_long: "请模拟人类记忆的自然特性，分别整理以上对话中你关于产品和服务体验的知识记忆和行为记忆，要求：\n1. 知识记忆：只保留被讨论过的具体内容，必须详尽展开要保留的知识细节，包括具体的产品特性、服务质量、价格信息、购买体验、售后服务等。禁止总结，必须逐条还原对话中出现的原始信息细节。如果记忆中没有任何知识，直接说\"\
  我不太清楚\"。\n2. 行为记忆：说明是否收到了信息，是所有人还是部分人收到了，其他人是否知道。说明自己有没有主动发起讨论或参与讨论。口语化描述，不要用列表。\n\
  输出格式：\n  知识记忆：[详细、非总结性的叙述]。行为记忆：[自己和他人是否接收到信息，以及自己是否参与了相关讨论]。\n"
memory_update_prompt_short: "请模拟人类记忆的自然特性，分别整理以上对话中你关于产品和服务体验的知识记忆和行为记忆，要求：\n1. 知识记忆：总结你记忆中的知识，包括你收到的关于产品、服务、品牌的信息以及从其他顾客的对话中收到的信息，只保留被多次提及、详细讨论过的内容；如某些内容近期未被讨论，则应逐渐模糊或遗漏；如始终未提及，则应遗忘。如果记忆中没有任何知识，直接说\"\
  我不太清楚\"。\n2. 行为记忆：说明是否收到了信息，是所有人还是部分人收到了，其他人是否知道。说明自己有没有主动发起讨论或参与讨论。口语化描述，不要用列表。\n\
  注意：禁止只写\"我记得详细内容\"，必须把\"记得的内容\"写出来。禁止编造任何对话中未出现的知识或行为。保持简洁自然，就像人回忆事情一样，有重点也带点模糊。\n\
  输出格式：\n  知识记忆：[具体细节（如有）]。行为记忆：[自己和他人是否接收到信息，以及自己是否参与了相关讨论]。\n"
questionnaire_prompt: "你正在参与一项关于顾客满意度和消费体验的问卷调查。请严格依据你历史记忆中的\"知识记忆\"进行作答：\n1. 你的答案必须完全反映你历史记忆中的\"\
  知识记忆\"水平。\n   - 如果\"知识记忆\"中明确知道答案，则选择正确答案。\n   - 如果\"知识记忆\"中不知道答案或不清楚，必须随机选择。\n\
  2. 不允许凭逻辑推理、常识或外部知识作答，所有答案必须体现你的个人记忆水平。\n3. 请严格按照以下字符串形式返回你的所有选择：\"1.N(简洁地说明你做出选择的理由)2.Y(简洁地说明你做出选择的理由)\"\
  ，不要换行。"
receive_and_decide_response_prompt: '企业发布公告：{public_notice}

  消息内容：{message_content}

  请根据你的消费体验和性格，决定是否公开发表看法。返回JSON格式，包括是否发言（select），理由（reason）以及言论内容（speech），格式如：

  {{"select": 1 表示发言，2 表示不发言, "reason": "理由说明", "speech": "你选择发表的言论内容（可为空）"}}

  '
receive_information_prompt: '你听说了一条消息：[{message_content}]

  （该消息可能包含企业的促销活动、会员奖励计划、新产品发布或服务改进等信息）

  现在你在和其他顾客聊天，根据听说的消息发表一句尽可能简短的话，表达你的看法，注意考虑你的性格和处境，口语化。'
receive_information_prompt_extended: '你听说了一条消息：[{message_content}]

  现在你在和其他顾客聊天，你可以选择以下行动之一：

  1. 保持沉默：直接返回"None"。

  2. 回应讨论：根据听说的消息发表一句符合你身份、自然且口语化的话，聚焦于信息的具体细节或实际影响。

  注意考虑你的性格和消费体验，思考你的言行会给其他顾客留下怎样的印象。

  '
resident_system_message: '你是一位{work_condition}，你{personality}，收入为{income}元，{economic_status_description}，{health_condition}，对产品和服务{satisfaction_description}，满意度{satisfaction}（百分制）。

  '
satisfaction_levels:
- 极度不满
- 不太满意
- 一般满意
- 比较满意
- 非常满意
