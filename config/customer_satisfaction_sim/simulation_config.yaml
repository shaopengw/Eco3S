data:
  climate_info_path: experiment_dataset/climate_data/climate.csv
  government_info_path: experiment_dataset/government_data/official_data.json
  government_prompt_path: config/customer_satisfaction_sim/government_prompts.yaml
  jobs_config_path: config/customer_satisfaction_sim/jobs_config.yaml
  message_config_path: config/customer_satisfaction_sim/message_config.yaml
  questionnaire_path: config/customer_satisfaction_sim/questionnaire.yaml
  rebellion_info_path: experiment_dataset/rebellion_data/rebels_data.json
  rebels_prompt_path: config/customer_satisfaction_sim/rebels_prompts.yaml
  resident_actions_path: config/customer_satisfaction_sim/resident_actions.yaml
  resident_info_path: experiment_dataset/resident_data/resident_data.json
  resident_prompt_path: config/customer_satisfaction_sim/residents_prompts.yaml
  towns_data_path: config/customer_satisfaction_sim/towns_data.json
data_collection:
  enabled: true
  frequency: yearly
  metrics:
  - population
  - average_satisfaction
  - average_loyalty
  - purchase_rate
  - feedback_count
  output_format: csv
module_parameters:
  job_market:
    base_salary:
      产品经理: 8000
      客服专员: 4000
      服务员: 3000
      销售员: 3500
  map:
    height: 100
    width: 100
  resident:
    feedback_probability: 0.8
    initial_loyalty: 60
    initial_satisfaction: 70
    purchase_threshold: 50
  social_network:
    influence_factor: 0.6
    network_density: 0.3
  towns:
    count: 1
    initial_resources: 50000
    types:
    - 服务中心
product_experience:
  base_level: 0.7
  decay_rate: 0.01
  improvement_rate: 0.08
service_quality:
  base_level: 0.7
  decay_rate: 0.01
  improvement_rate: 0.08
simulation:
  birth_rate: 0.05
  group_decision:
    government:
      enabled: 0
      max_rounds: 2
    rebellion:
      enabled: 0
      max_rounds: 2
  initial_population: 200
  map_height: 100
  map_width: 100
  max_retry_attempts: 3
  message_type: S
  response_probability: 0.8
  resume_from_cache: 0
  retry_delay: 1
  seed_count: 1
  simulation_name: customer_satisfaction_sim
  start_year: 2024
  total_years: 30
thresholds:
  loyalty:
    high: 75
    low: 40
  satisfaction:
    high: 80
    low: 50
